prompt: 'Create a {ASPECT_RATIO} image in the Playful Marker Grounding Poster Style. Subject: {SUBJECT}. Action: {SUBJECT_ACTION}. Prop/Product: {PRODUCT_OR_PROP}. Location: {LOCATION}. Background: {BACKGROUND_ELEMENTS}.
  Main text: {MAIN_TEXT}. Secondary text: {SECONDARY_TEXT}. Accent symbol: {ACCENT_SYMBOL}. Wardrobe/styling: {WARDROBE_STYLE}. Style fidelity anchors: {STYLE_FIDELITY_ANCHORS}. Source content to avoid:
  {SOURCE_CONTENT_TO_AVOID}. Apply these style rules: cream poster-paper border around an inset artwork field; loose sky-cyan and sour-lime marker-scribble background blocks with uneven white gaps; one
  oversized flat simple subject dominating the center-lower area; one tiny supporting prop or character for scale; thick imperfect black or dark-brown hand-drawn outlines with rounded wobbly ends; oversized
  hand-lettered dark-brown headline in the top zone; small lower-corner supporting text over or near a rough marker swash; tiny doodle accents such as flowers, dots, stars, motion ticks, and grass marks;
  flat even color with no shadows, no gradients, no realistic depth, no polished vector smoothing. Important content rule: match the reference style first, then change the source content. Use new subjects,
  new scene details, new props, and new text while preserving the style fidelity anchors. Avoid photorealism, 3D render, airbrush, glossy finish, dense scene clutter, exact source text, exact source pose,
  dog, butterfly, ground-touching premise, watermarks, signatures, platform marks, QR codes, and brand logos.'
