name: Playful Marker Grounding Poster Style
category: vigo_cookbook
ratio: 16:9 / 4:5 / 3:4 / 9:16
source_author: Vigo AI Visual Prompt Cookbook
source_url: 'https://x.com/VigoCreativeAI'
summary: A naive hand-drawn poster style built from cream paper margins, loose marker-scribble color blocks, thick uneven keylines, oversized casual lettering, and simple mascot-like figures arranged with
  clear public-service poster hierarchy.
tags:
- VigoCookbook
- naive
- marker
- illustration
- public-service
- announcement
- hierarchy
triggers:
- Playful Marker Grounding Poster Style
features:
- title: Cream poster-paper border with the artwork sitting inside a slightly inset field rather than bleeding to the edge.
  desc: ''
- title: Loose childlike marker-scribble background blocks, mostly bright sky cyan and sour lime green, with uneven white gaps.
  desc: ''
- title: Flat illustration with no realistic depth, no cast shadows, no gradients, and no polished vector smoothing.
  desc: ''
- title: Thick imperfect black or dark-brown outlines with variable pressure, rounded ends, and visibly wobbly hand-drawn edges.
  desc: ''
- title: One oversized simple subject dominates the lower middle of the poster, with tiny supporting props or characters as scale contrast.
  desc: ''
