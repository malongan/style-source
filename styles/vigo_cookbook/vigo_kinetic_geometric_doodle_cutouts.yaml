name: Kinetic Geometric Doodle Cutouts
category: vigo_cookbook
ratio: 16:9 / 4:5 / 3:4 / 9:16
source_author: Vigo AI Visual Prompt Cookbook
source_url: 'https://x.com/VigoCreativeAI'
summary: A sparse, playful illustration system where a character or object is assembled from oversized flat geometric color pieces, loose black doodle lines, paper grain, and buoyant off-center motion on
  a warm cream background.
tags:
- VigoCookbook
- Other
triggers:
- Kinetic Geometric Doodle Cutouts
features:
- title: Warm cream paper field with generous empty space around the subject.
  desc: ''
- title: One central figure, object, or small scene built from a few oversized geometric blocks.
  desc: ''
- title: Flat vector-like shapes with subtle printed grain, dry-brush speckle, and soft sprayed gradients.
  desc: ''
- title: Asymmetric kinetic pose with limbs or parts angled diagonally as if mid-motion.
  desc: ''
- title: Thick black hand-drawn contour strokes only on small details such as hands, shoes, hair, wheels, handles, or motion marks.
  desc: ''
