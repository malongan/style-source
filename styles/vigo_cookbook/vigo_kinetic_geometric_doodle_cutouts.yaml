prompt: 'Create a {ASPECT_RATIO} illustration in the Kinetic Geometric Doodle Cutouts style. Subject: {SUBJECT}. Action: {SUBJECT_ACTION}. Prop or object: {PRODUCT_OR_PROP}. Setting: {LOCATION}. Background
  details: {BACKGROUND_ELEMENTS}. Wardrobe or styling: {WARDROBE_STYLE}. Optional text treatment: {MAIN_TEXT}; secondary micro marks: {SECONDARY_TEXT}; accent symbol: {ACCENT_SYMBOL}. Style fidelity lock:
  {STYLE_FIDELITY_ANCHORS}. Content to avoid: {SOURCE_CONTENT_TO_AVOID}. Use a warm cream paper background with generous negative space. Construct the subject from five to nine oversized flat geometric
  color blocks: tomato orange, cobalt blue, magenta pink, lilac violet, mint green, golden yellow, black, and small white accents. Include subtle risograph grain, dry-brush speckle, and one or two soft
  sprayed gradients inside selected shapes. Add sparse loose black hand-drawn contour lines only for small expressive details and motion marks. Keep the image flat, airy, asymmetrical, buoyant, handmade,
  and print-like. Do not use realistic anatomy, 3D rendering, dense scenery, logos, signatures, watermarks, QR codes, or polished fonts.'
