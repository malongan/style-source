- title: Poster-first composition with an oversized black headline occupying the top band, side band, or dominant title block.
  desc: ''
- title: High layout density with very little empty space, while all shapes remain simple, flat, and readable.
  desc: ''
- title: One or two rounded white mascot-like figures or simplified graphic subjects drawn with very thick black outlines and minimal facial marks.
  desc: ''
- title: One large tilted cyan, teal, mint, or lemon color panel crossing the middle of the frame as the main graphic mass.
  desc: ''
