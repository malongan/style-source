prompt: 'Create a {ASPECT_RATIO} poster in the "Tokyo Kawaii Travel Collage Poster" style.


  Main subject: {SUBJECT}.

  Action or pose: {SUBJECT_ACTION}.

  Featured prop, food, or sticker object: {PRODUCT_OR_PROP}.

  Destination or location: {LOCATION}.

  City background and botanical elements: {BACKGROUND_ELEMENTS}.

  Main headline text: "{MAIN_TEXT}".

  Secondary or speech-bubble text: "{SECONDARY_TEXT}".

  Travel stickers and accent symbols: {ACCENT_SYMBOL}.

  Wardrobe and cutout styling: {WARDROBE_STYLE}.


  Use a maximalist Japanese travel scrapbook collage layout. Place the cutout subject large in the center with a sticker-like white edge. Put huge playful rounded block letters across the top, each letter
  on a separate bright paper tile, slightly rotated and overlapping. Use yellow letter fill, green tile blocks, red accents, cream paper textures, and black ink details.


  Layer the background with black-and-white or sepia city photography, crowd scenes, buildings, street signs, and halftone print texture. Add manga speech bubbles, handwritten notes, tiny captions, food
  icons, ticket stubs, barcode graphics, mini photo panels, sticker stars, arrows, and travel labels.


  Add a dense yellow bottom information bar with small photos, captions, travel snippets, barcode, and bold label typography. Mix in watercolor or pressed-flower botanical elements near the lower area.
  The finish should feel like scanned paper, teen magazine collage, souvenir zine, sticker album, and cute travel advertisement.


  Avoid minimalism, clean corporate design, luxury travel style, plain backgrounds, low density, and overly polished digital graphics.'
