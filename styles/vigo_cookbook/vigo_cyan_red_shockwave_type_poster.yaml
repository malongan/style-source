prompt: 'Create a {ASPECT_RATIO} image in the "Cyan Red Shockwave Type Poster Style" visual style.


  Subject: {SUBJECT}

  Action: {SUBJECT_ACTION}

  Prop/Product: {PRODUCT_OR_PROP}

  Location: {LOCATION}

  Background: {BACKGROUND_ELEMENTS}

  Main text: {MAIN_TEXT}

  Secondary text: {SECONDARY_TEXT}

  Accent symbol: {ACCENT_SYMBOL}

  Wardrobe/styling: {WARDROBE_STYLE}

  Style fidelity anchors: {STYLE_FIDELITY_ANCHORS}

  Source content to avoid: {SOURCE_CONTENT_TO_AVOID}


  Apply these style rules: saturated cyan full-bleed background; oversized cropped red block display lettering used as architecture; one white jagged lightning-burst shape cutting diagonally through the
  center; flat vector subjects with thick red keylines and hard edges; lemon-yellow hands or accent shapes; small red dots, rings, slanted underlines, and sound-effect labels; compact rotated or vertical
  microcopy clusters; crowded but clean poster hierarchy; mostly orthographic flatness with diagonal forced motion; no realistic lens, shadows, or photographic lighting; optional tiny warm red-orange gradient
  only inside an accent area.


  Important content rule: preserve the visual system first, then change the source content. Use new subjects, new props, new setting details, and new text. Do not recreate bowls, soup, noodles, drinking,
  cheers, clinking vessels, source location copy, source seals, source marks, or the same two-object diagonal composition.


  Avoid photorealism, 3D rendering, glossy product lighting, realistic paper mockup, watercolor, delicate serif typography, beige vintage poster treatment, neon cyberpunk glow, cluttered market detail,
  QR codes, watermarks, logos, signatures, or exact copied source text.'
