features:
- title: Saturated cyan background dominates the entire poster, with red and yellow used as the only major accents.
  desc: ''
- title: Huge red geometric display lettering is cropped by the page edges and functions as both text and architecture.
  desc: ''
- title: A white jagged lightning-burst shape cuts diagonally through the center and carries the main action.
  desc: ''
- title: Subjects are simplified flat vector forms with almost no shading, outlined by thick red keylines.
  desc: ''
- title: Human or hand-like accents use solid lemon yellow fills, making them graphic shapes rather than realistic anatomy.
  desc: ''
