summary: A flat illustrated poster system built from a saturated cyan field, oversized red block typography, lemon-yellow human accents, white jagged shockwaves, thick red keylines, and compact rotated
  microcopy. It feels like a loud regional travel poster crossed with manga impact graphics and screenprinted street signage.
