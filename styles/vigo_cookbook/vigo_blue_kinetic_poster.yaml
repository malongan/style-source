- title: A giant neon-lime speech-bubble or banner panel dominates the center with a sharp triangular tail or cutout.
  desc: ''
- title: A flat yellow geometric back plate peeks from behind the lime panel to create high-contrast poster depth.
  desc: ''
- title: Massive black block typography is the primary visual mass, cropped tight and packed inside the lime shape.
  desc: ''
- title: Letterforms feel blunt, heavy, slightly irregular, and comic-like rather than refined or corporate.
