summary: A loud flat comic-poster system built from electric-blue grid paper, oversized neon-lime speech-panel geometry, heavy black block typography, sharp yellow back plates, radial action marks, and
  gritty print texture. The style feels like a kinetic street flyer where the headline is the main subject.
