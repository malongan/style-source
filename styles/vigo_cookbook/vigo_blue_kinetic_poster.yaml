prompt: 'Create a {ASPECT_RATIO} raster poster in the Blue Lime Kinetic Comic Type Poster Style. Preserve these style anchors first: {STYLE_FIDELITY_ANCHORS}. Use an electric-blue full-bleed grid-paper
  background, a huge slanted neon-lime speech-panel or cut-paper banner, a sharp yellow geometric back plate behind it, massive black rough comic-block Chinese typography packed tightly into the lime panel,
  a black strip or edge zone for secondary text, radial black action rays, small arrow/separator marks, subtle halftone dots, ink speckles, rough printed edges, and flat screenprint color. New content:
  {SUBJECT} doing {SUBJECT_ACTION}, with {PRODUCT_OR_PROP}, located in {LOCATION}. Background details: {BACKGROUND_ELEMENTS}. Main headline text: {MAIN_TEXT}. Secondary text: {SECONDARY_TEXT}. Accent symbol:
  {ACCENT_SYMBOL}. Wardrobe or subject styling: {WARDROBE_STYLE}. Keep the composition shallow, loud, compressed, tilted, and type-dominant. Avoid recreating source content: {SOURCE_CONTENT_TO_AVOID}. No
  watermark, no username, no QR code, no brand logo.'
