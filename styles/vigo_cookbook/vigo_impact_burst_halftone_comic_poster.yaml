- title: 'Preserve the core visual identity: A loud retro comic poster system built from thick black ink, flat high-saturation colors, oversized impact typography, exaggerated illustrated subjects, diagonal
    props, speech bursts, smoke puffs, halftone dots, and distressed screen-print grain.'
  desc: ''
- title: 'Layout: use a bold cropped comic-poster composition.'
  desc: ''
- title: Place the main subject large in the lower two-thirds and let the oversized prop cut diagonally across the body or foreground.
  desc: ''
- title: 'Style: thick uneven black contour lines, flat hot-orange and aged-cream character shapes, saturated cyan backdrop, lemon-yellow speech-burst corner, muted olive prop color, small gray accent,
    distressed screen-print texture, halftone dots, paper grain, rough ink edges, and slight print misregistration.'
  desc: ''
- title: 'Avoid: watermark, username, creator ID, platform logo, QR code, app UI, artist signature, copied reference character, copied exact pose, copied exact text, brand logos, licensed characters, photorealism,
