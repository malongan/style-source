prompt: 'Create an image in chromatic-fisheye-orbit-pop-poster-style.


  Aspect ratio: {ASPECT_RATIO}.


  Scene: {SUBJECT} {SUBJECT_ACTION}, featuring {PRODUCT_OR_PROP}, in {LOCATION}. Include {BACKGROUND_ELEMENTS}. Style the subject with {WARDROBE_STYLE}.


  Photography: build a finished high-key pop culture poster, not a sketch. Use an extreme fisheye or convex glass-dome viewpoint from below, with the subject centered inside a circular lens bubble. Keep
  people, props, hair, fabric, and hands photographic and realistic while allowing wide-angle edge distortion.


  Layout: keep the surrounding field mostly warm off-white and pale grey so the graphic system has open space. Hold the subject in a central circular dome and let the composition feel off-axis, kinetic,
  and orbiting without cluttering the center.


  Typography: set "{MAIN_TEXT}" as huge heavy display typography warped around the circular lens. Crop the headline at multiple frame edges and fill the letters with hot vermilion, orange, red, and fluorescent
  magenta ink texture. Add "{SECONDARY_TEXT}" only as a small red editorial caption block in a quiet corner.


  Graphic system: include {ACCENT_SYMBOL}, aqua/cyan light arcs, prism smears, faint chromatic aberration, radial motion blur near the rim, subtle analog grain, screenprint speckle, and slight color bleed.
  The result should feel like a contemporary music, fashion, or culture campaign viewed through a warped circular lens.


  Avoid: watermarks, usernames, creator IDs, QR codes, platform logos, app interface marks, copied reference people, copied event text, copied venue text, copied exact pose, exact YOASOBI text, exact anniversary
  wording, long paragraph text, tiny crowded text, flat vector substitutes, SVG look, HTML mockup, canvas drawing, corporate minimalist poster, muted beige-only palette, dark nightclub scene, cyberpunk
  darkness, luxury studio calm, fake brand logos, distorted unreadable faces, extra limbs, and misshapen hands.'
