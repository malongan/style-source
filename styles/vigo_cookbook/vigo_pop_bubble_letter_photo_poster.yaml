features:
- title: 'Preserve the core visual identity: A punchy photo-and-illustration poster style built around a central low-angle fashion portrait framed by oversized flat bubble-letter shapes, saturated candy
    colors, thick black outlines, oval highlights, and crisp sparkle marks.'
  desc: ''
- title: 'Use real photographic portrait detail for the subject: low-angle editorial framing, bright direct sunlight or clean studio light, crisp skin and fabric texture, saturated wardrobe, calm confident
    expression.'
  desc: ''
- title: 'Layout: center the subject on the vertical axis and surround them with ACCENT_SYMBOL and bubble-letter graphic forms.'
  desc: ''
- title: Build the poster from oversized flat bubble-letter forms spelling or suggesting MAIN_TEXT.
  desc: ''
