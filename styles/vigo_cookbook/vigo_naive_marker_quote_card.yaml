prompt: 'Create a {ASPECT_RATIO} image in the "Naive Marker Quote Card Style" visual
  style.


  Subject: {SUBJECT}

  Action: {SUBJECT_ACTION}

  Prop/Product: {PRODUCT_OR_PROP}

  Location: {LOCATION}

  Background: {BACKGROUND_ELEMENTS}

  Main text: {MAIN_TEXT}

  Secondary text: {SECONDARY_TEXT}

  Accent symbol: {ACCENT_SYMBOL}

  Wardrobe/styling: {WARDROBE_STYLE}

  Style fidelity anchors: {STYLE_FIDELITY_ANCHORS}

  Source content to avoid: {SOURCE_CONTENT_TO_AVOID}


  Apply these style rules: draw a rough skinny poster card with a pale pastel interior
  panel, uneven black marker border, a small crooked top tab, a small bottom nameplate,
  one central absurd object-character, and sparse quiet negative space. Render everything
  as flat naive hand-marker illustration on scanned paper, with wobbly black outlines,
  imperfect shape closure, small dot textures, simple frontal forms, and no realistic
  depth. Use bright blue uppercase hand lettering in compact broken lines, irregular
  spacing, and awkward baselines; the text must look manually drawn, not typeset.
  Use a limited pastel palette with pale pink or cream ground, tan and muted object
  fills, tiny green or yellow accents, and no gradients. The central subject should
  be large, deadpan, and simple, with any face or limbs drawn crudely. Preserve the
  quote-card hierarchy first, then change all source content.


  Avoid: photorealism, 3D render, polished vector art, clean comic-book inking, perfect
  typography, dense scenery, gradients, dramatic shadows, brand logos, usernames,
  QR codes, watermarks, copied source text, copied celebrity or author names, copied
  cow, copied burger, copied food-animal transformation premise.


  Important content rule: match the reference style first, then change the source
  content. Use new subjects, new scene details, new props or products, and new text,
  while preserving the style fidelity anchors.'
