prompt: 'Create a {ASPECT_RATIO} image in the "Gothic Cat Doodle Photo Collage" style.


  Subject: {SUBJECT}.

  Subject action: {SUBJECT_ACTION}.

  Prop or small secondary element: {PRODUCT_OR_PROP}.

  Location: {LOCATION}.

  Background elements: {BACKGROUND_ELEMENTS}.

  Main text: {MAIN_TEXT}.

  Secondary text: {SECONDARY_TEXT}.

  Accent symbol: {ACCENT_SYMBOL}.

  Wardrobe or visual styling: {WARDROBE_STYLE}.


  Use a realistic low-angle architectural photograph as the base layer. Keep the facade detailed, recognizable, and photographic, with dramatic vertical perspective and a saturated teal sky. Overlay one
  oversized flat cartoon creature in saturated tomato red or another bold color, with rough black marker contours, simple expressive features, cropped limbs, and small yellow edge highlights. Make the creature
  interact physically with the building, wrapping around arches, towers, windows, or rooflines.


  Add huge cream-white bubble graffiti lettering across the top of the frame, with thick cobalt blue outline, warm yellow offset shadow, chalky glow, and imperfect hand-drawn spacing. Add small doodle circles,
  swooshes, sparks, motion curves, and tiny secondary cartoon figures in windows or doorways for scale contrast.


  Avoid watermark, username, creator ID, platform logo, QR code, app UI, realistic 3D mascot, plush toy texture, full cartoon background, clean corporate layout, dense text, and low-detail architecture.'
