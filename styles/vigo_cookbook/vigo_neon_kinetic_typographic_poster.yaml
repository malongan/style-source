prompt: 'Create a {ASPECT_RATIO} poster in the "Neon Kinetic Typographic Poster" style.


  Main subject: {SUBJECT}.

  Action: {SUBJECT_ACTION}.

  Prop or product: {PRODUCT_OR_PROP}.

  Location: {LOCATION}.

  Background elements: {BACKGROUND_ELEMENTS}.

  Wardrobe or styling: {WARDROBE_STYLE}.


  Use an extreme low-angle wide-angle camera perspective, as if the camera is near the ground looking upward. The subject should feel large, energetic, and close to the viewer.


  Add oversized warped neon yellow typography using the main text "{MAIN_TEXT}". The letters should be ultra-bold, condensed, stretched, slanted, and partially cropped by the canvas edges. The typography
  should wrap around the composition and sit behind or partially around the subject.


  Add a thin repeated uppercase text band reading "{SECONDARY_TEXT}", separated by "{ACCENT_SYMBOL}" symbols. The secondary text should run horizontally across the image like a campaign graphic stripe.


  Use electric neon yellow graphics, warm sunlit photographic tones, blue sky contrast, visible film grain, analog print texture, hard shadows, and an energetic youth-culture campaign poster mood.


  Avoid clean corporate design, small typography, flat illustration, pastel colors, luxury minimalism, and symmetrical static layout.'
