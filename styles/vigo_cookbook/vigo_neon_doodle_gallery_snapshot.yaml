prompt: 'Create a {ASPECT_RATIO} image in the "Neon Doodle Gallery Snapshot" style.


  Subject: {SUBJECT}.

  Subject action: {SUBJECT_ACTION}.

  Prop or product: {PRODUCT_OR_PROP}.

  Location: {LOCATION}.

  Background elements: {BACKGROUND_ELEMENTS}.

  Main handwritten text: "{MAIN_TEXT}".

  Secondary handwritten text: "{SECONDARY_TEXT}".

  Accent symbol: {ACCENT_SYMBOL}.

  Wardrobe style: {WARDROBE_STYLE}.


  Use a realistic candid phone-photo as the base layer. The setting should feel specific and ordinary: visible walls, art, shelves, labels, tables, lamps, posters, people, bags, shadows, grain, and imperfect
  handheld framing.


  Draw a loud digital marker layer directly on top of the photo. Wrap the main subject with a thick hot-pink contour and a cyan offset glow. Add yellow-orange monster spikes, horns, rays, fins, or sunburst
  shapes around the silhouette. Scatter rough hand-drawn symbols around the frame: stars, paw prints, spiderweb corners, halos, abstract eyes, plants, flowers, scribble underlines, tally marks, arrows,
  hearts, and sticker-like blobs.


  Place rough uppercase handwritten marker text in open areas, using white, yellow, or lime green. The text should feel funny, personal, distracted, and student-made. Preserve the contrast between a real
  candid photo and chaotic handmade doodles.


  Avoid watermarks, usernames, platform logos, creator IDs, app marks, QR codes, clean vector-only illustration, fully illustrated backgrounds, polished ad layout, luxury editorial styling, perfect typography,
  empty sterile locations, identifiable celebrities, and tiny unreadable text.'
