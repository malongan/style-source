prompt: 'Create a {ASPECT_RATIO} image in the "Subway Doodle Photo Hybrid" style.


  Main photo subject: {SUBJECT}.

  Action or transit moment: {SUBJECT_ACTION}.

  Foreground doodle or prop: {PRODUCT_OR_PROP}.

  Transit location, city, or line: {LOCATION}.

  Crowd, signage, and documentary background: {BACKGROUND_ELEMENTS}.

  Handwritten text: "{MAIN_TEXT}".

  Signage or supporting text: "{SECONDARY_TEXT}".

  Color accents and doodle marks: {ACCENT_SYMBOL}.

  Illustrated face and photo-tone treatment: {WARDROBE_STYLE}.


  Use a realistic phone-shot public transportation photograph as the base layer. Frame the scene through train doors, bus doors, a station platform, or a transit window. Keep the environment documentary:
  gray metal, fluorescent lighting, route signs, safety strips, platform edge, crowded people, reflections, phone-camera grain, and slight social-media compression.


  Paint expressive cartoon doodles directly over the photo. Replace some real faces with loose hand-drawn cartoon heads, exaggerated noses, red cheeks, messy hair, crooked smiles, and thick sketchy outlines.
  Add a large foreground cartoon gesture entering from the lower edge or side, such as a hot-pink thumbs-up, pointing finger, peace sign, phone, or ticket. Add casual white handwritten notes near the upper-left.


  The final image should feel like a real transit snapshot that someone humorously drew over, mixing documentary urban realism with playful comic chaos.


  Avoid clean vector illustration, fully illustrated backgrounds, luxury editorial polish, empty trains, perfect symmetry, branded mascots, overly clean typography, watermarks, usernames, QR codes, platform
  logos, creator IDs, and app marks.'
