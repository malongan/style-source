features:
- title: Cream paper background with warm tint, subtle speckle, and no realistic environment.
  desc: ''
- title: Thick black marker or oil-pastel keylines with scratchy edges, wobble, and uneven pressure.
  desc: ''
- title: One huge simplified character or object-character fills most of the frame and is cropped boldly.
  desc: ''
- title: Flat childlike construction with no realistic perspective, no 3D modeling, and no polished vector edges.
  desc: ''
- title: Saturated marker fills show visible grain, small white gaps, and rough hand-colored texture.
  desc: ''
