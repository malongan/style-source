prompt: 'Create a {ASPECT_RATIO} image in the "Plush City Festival Mobile Poster" style.


  Event/headline: {MAIN_TEXT}.

  Primary mascot or subject: {SUBJECT}.

  Mascot action: {SUBJECT_ACTION}.

  Secondary mascot, prop, or festival object: {PRODUCT_OR_PROP}.

  City or district: {LOCATION}.

  Landmarks, sky, weather, and ground plane: {BACKGROUND_ELEMENTS}.

  Date, location, and top micro text: {SECONDARY_TEXT}.

  CTA or accent mark: {ACCENT_SYMBOL}.

  Mascot styling: {WARDROBE_STYLE}.


  Use a bright mobile-first festival poster layout with a large rounded top visual card, clean blue sky, soft clouds, realistic city landmarks, and fuzzy plush 3D mascot characters in the foreground. Put
  the event name in large bold white rounded sans-serif typography across the top sky area. Place clear date and location information near the bottom of the visual card.


  For vertical layouts, include a white rounded mobile bottom sheet with a small handle icon and the CTA text. Add subtle mobile UI elements such as a back arrow and three-dot menu at the top. Keep everything
  cheerful, readable, family-friendly, sunny, civic, and polished.


  Avoid dark mood, gritty realism, hard-edged sci-fi, luxury travel styling, unreadable text, scary mascots, and abstract backgrounds.'
