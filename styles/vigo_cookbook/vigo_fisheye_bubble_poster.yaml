prompt: 'Create an image in sunburst-fisheye-bubble-type-poster-style.


  Aspect ratio: {ASPECT_RATIO}.


  Scene: {SUBJECT_IDENTITY}, {SUBJECT} {SUBJECT_ACTION}, using or wearing {PRODUCT_OR_PROP}, in {LOCATION}. Include {BACKGROUND_ELEMENTS}. Style the subject with {WARDROBE_STYLE}. For a multi-case set,
  give every case a visibly different face, hair, body language, and styling details.


  Photography: {LENS_STYLE}. Place the camera below the subject looking upward, very close to the body and face. Preserve realistic skin, fabric, hair, accessories, and daylight reflections. Use harsh sunny
  lighting, saturated cobalt sky, warm skin highlights, crunchy shadows, and a spontaneous summer travel feeling.


  Layout: make the subject large and cropped, with the face near the upper-middle for vertical layouts or dominant center-left/center-right for horizontal layouts. Build the poster around a huge arched
  bubble headline reading "{MAIN_TEXT}" in lemon yellow across the top and side edges. The letters should feel inflated, hand-painted, warped by perspective, and partly cropped by the frame. Use golden
  orange edge shading, cream shine slashes, and {ACCENT_SYMBOL}.


  Texture: add {TEXTURE_LEVEL}, slight lens flare, color fringing, and analog poster compression. Add "{SECONDARY_TEXT}" only as tiny editorial microcopy if it stays clean and unobtrusive.


  Avoid: watermarks, usernames, creator IDs, QR codes, platform logos, app marks, copied reference person, copied reference outfit, copied exact pose, copied exact text, repeated same face across a sample
  set, chrome lettering, glossy 3D balloon type, corporate minimal layout, muted pastel palette, night cyberpunk mood, and crowded small text.'
