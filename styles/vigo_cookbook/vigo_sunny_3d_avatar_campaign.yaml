prompt: 'Create an {ASPECT_RATIO} high-energy social campaign poster in Sunny 3D Avatar Campaign Style. Preserve these style anchors: {STYLE_FIDELITY_ANCHORS}. Avoid this source content: {SOURCE_CONTENT_TO_AVOID}.
