- kv_var: 变量
  style_var: 说明
  desc: ''
- kv_var: '`SUBJECT`'
  style_var: main subject, artist, dancer, musician, skater, model, or youth culture figure
  desc: ''
- kv_var: '`SUBJECT_ACTION`'
  style_var: sitting, leaning, holding a prop, looking away, posing casually, or performing a relaxed streetwear pose
  desc: ''
- kv_var: '`PRODUCT_OR_PROP`'
  style_var: cassette player, headphones, soda can, compact camera, skateboard, magazine, CD player, or portable music device
  desc: ''
- kv_var: '`LOCATION`'
  style_var: street wall, underground club, bedroom studio, subway corner, record shop, rehearsal room, or back alley
  desc: ''
- kv_var: '`BACKGROUND_ELEMENTS`'
  style_var: black-and-white grunge wall texture, graffiti-like marks, photocopy noise, rough concrete, scanned poster grain
  desc: ''
- kv_var: '`MAIN_TEXT`'
  style_var: large acid yellow retro headline
  desc: ''
prompt: 'Create a Y2K grunge hip-hop cutout poster featuring {SUBJECT} {SUBJECT_ACTION}, wearing {WARDROBE_STYLE}, holding or interacting with {PRODUCT_OR_PROP}. Place the subject as a large central photo
  cutout with an irregular white sticker-like outline. Use a dirty black-and-white grunge wall background with {BACKGROUND_ELEMENTS}. Add a huge acid yellow retro serif headline reading "{MAIN_TEXT}" across
  the top, partially hidden behind the subject. Add a bright acid yellow information strip at the bottom with small editorial text reading "{SECONDARY_TEXT}", small inset photo frames, barcode-like graphic
  elements, and {ACCENT_SYMBOL}. The image should feel like an early-2000s underground music magazine cover, mixtape poster, streetwear flyer, rough scanned print, high contrast, heavy grain, photocopy
  texture, cyan and magenta print noise, energetic collage layout. Do not include watermarks, usernames, QR codes, platform logos, or app marks. Aspect ratio: {ASPECT_RATIO}.'
