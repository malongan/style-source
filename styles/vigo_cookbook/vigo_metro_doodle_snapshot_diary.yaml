prompt: 'Create a {ASPECT_RATIO} image in the "Metro Doodle Snapshot Diary" style.


  Subject: {SUBJECT}.

  Subject action: {SUBJECT_ACTION}.

  Foreground prop or product: {PRODUCT_OR_PROP}.

  Location: {LOCATION}.

  Background elements: {BACKGROUND_ELEMENTS}.

  Main handwritten text: "{MAIN_TEXT}".

  Secondary handwritten text: "{SECONDARY_TEXT}".

  Accent symbol: {ACCENT_SYMBOL}.

  Wardrobe style: {WARDROBE_STYLE}.


  Use a realistic candid phone-photo as the base layer. The scene should feel like a real public transit or dense city moment: visible doors, rails, signs, floor markings, lights, scuffed surfaces, reflections,
  crowd density, practical clothing, and imperfect handheld framing.


  Draw playful comic-marker doodles directly on top of the photo. Add saturated cartoon face overlays to selected people, thick black sketch outlines, red cheeks, exaggerated noses, messy hair, small sparks,
  arrows, underlines, and rough marker fill. Add one oversized illustrated foreground hand, ticket, transit card, phone, bag, food item, or gesture that overlaps the lower frame.


  Place loose white handwritten diary text in natural negative space, usually near the upper-left. Keep the text personal, uneven, and marker-like. The final image should feel like a real city snapshot
  that someone humorously annotated afterward.


  Avoid watermarks, usernames, platform logos, creator IDs, app marks, QR codes, clean vector-only illustration, fully illustrated backgrounds, polished ad layout, empty transit scenes, luxury lighting,
  perfect symmetry, branded mascots, identifiable celebrities, and tiny unreadable text.'
