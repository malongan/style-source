name: Warm Fisheye Product Impact Ad Style
category: vigo_cookbook
ratio: 16:9 / 4:5 / 3:4 / 9:16
source_author: Vigo AI Visual Prompt Cookbook
source_url: 'https://x.com/VigoCreativeAI'
summary: A high-impact product advertising style built from ultra-wide close-up photography, a tunnel of textured foreground pieces, oversized angled white Chinese display type, warm amber-brown contrast,
  tiny top navigation labels, product-pack callouts, and compressed social-banner density. It feels like a loud commercial thumbnail shot from inside a pile of snack-like objects, with the product and subject
  rushing toward the viewer.
tags:
- VigoCookbook
- Other
triggers:
- Warm Fisheye Product Impact Ad Style
features:
- title: Extreme fisheye or ultra-wide macro perspective from inside a product pile, bowl, or tunnel.
  desc: ''
- title: Foreground is crowded with many warm brown or golden textured pieces forming a thick border around the image.
  desc: ''
- title: Hero subject is very close to the lens with cropped face, hand, object, package, or product detail pressing toward the viewer.
  desc: ''
- title: Dense commercial banner hierarchy with little empty space, layered subject, product pack, headline, and small captions.
  desc: ''
- title: Huge angled white Chinese display headline with heavy black shadow or extruded 3D block depth.
  desc: ''
variables:
- kv_var: 变量
  style_var: 说明
  desc: ''
- kv_var: '`SUBJECT`'
  style_var: new main subject, product presenter, tiny robot, athlete, maker, hand model, tool, device, or object hero that is not the source subject
  desc: ''
- kv_var: '`SUBJECT_ACTION`'
  style_var: leaning into the lens, reaching through foreground pieces, bursting from a product pile, presenting the prop, grabbing the hero product, or reacting with exaggerated ad energy
  desc: ''
- kv_var: '`PRODUCT_OR_PROP`'
  style_var: new package, beverage, snack, tool, device, camera, accessory, or product pack that is not the original source product
  desc: ''
- kv_var: '`LOCATION`'
  style_var: warm studio tunnel, tabletop pile, product bowl, snack canyon, counter scene, compact commercial set, or macro advertising environment
  desc: ''
- kv_var: '`BACKGROUND_ELEMENTS`'
  style_var: ring of textured foreground objects, dark warm vignette, blue accent blocks, top category labels, small product callout, motion streaks, tilted headline, and dense bottom caption strip
  desc: ''
- kv_var: '`MAIN_TEXT`'
  style_var: short punchy Chinese headline or exclamation, usually 2 to 5 large characters, set in huge white extruded display type
  desc: ''
prompt: 'Create a {ASPECT_RATIO} image in the "Warm Fisheye Product Impact Ad Style" visual style.


  Subject: {SUBJECT}

  Action: {SUBJECT_ACTION}

  Prop/Product: {PRODUCT_OR_PROP}

  Location: {LOCATION}

  Background: {BACKGROUND_ELEMENTS}

  Main text: {MAIN_TEXT}

  Secondary text: {SECONDARY_TEXT}

  Accent symbol: {ACCENT_SYMBOL}

  Wardrobe/styling: {WARDROBE_STYLE}

  Style fidelity anchors: {STYLE_FIDELITY_ANCHORS}

  Source content to avoid: {SOURCE_CONTENT_TO_AVOID}


  Apply these style rules:

  - Build a dense Chinese social-commerce advertising visual, not a clean editorial poster.

  - Use a macro ultra-wide fisheye viewpoint from inside a pile, bowl, bucket, or tunnel of repeated textured foreground pieces.

  - Make the hero subject, product, face, hand, tool, or package press close to the lens with cropped edges, glossy highlights, realistic occlusion, and exaggerated scale.

  - Surround the frame with warm toasted brown, caramel, golden, cream, or black foreground pieces that form a cave-like border.

  - Set {MAIN_TEXT} as huge angled white Chinese display type with heavy black drop shadow or 3D extrusion.

  - Add small generic top category labels, a bottom product-pack or prop strip, a blue callout tab, and white speed lines or radial perspective streaks.

  - Keep the finish photorealistic, high-contrast, sharpened, warm, humorous, appetizing, and retail-advertising focused.


  Avoid:

  - {NEGATIVE_PROMPT}


  Important content rule: match the extracted style first, then change the source content. Use new subjects, new products, new package details, and new text while avoiding the original pet-food source premise.'
