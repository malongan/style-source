features:
- title: Full black canvas with the graphic card floating as the only bright object.
  desc: ''
- title: One large cream or aged-paper irregular cutout card, with rounded handmade edges and a different silhouette per case.
  desc: ''
- title: 'Dense left-to-right poster hierarchy: large vertical Chinese brush lettering competes with a food photo and a price medallion.'
  desc: ''
- title: Food is treated as a glossy clipped photo collage element, not a flat illustration.
  desc: ''
- title: Card interior uses warm cream, faded ochre, deep red, orange, brown, and black ink with limited palette discipline.
  desc: ''
