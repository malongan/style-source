prompt: 'Create a {ASPECT_RATIO} promotional food poster in the "Black Cutout Food Card Ad" visual style. Subject: {SUBJECT}. Action: {SUBJECT_ACTION}. Product or prop: {PRODUCT_OR_PROP}. Location context:
  {LOCATION}. Background and card details: {BACKGROUND_ELEMENTS}. Main text: {MAIN_TEXT}. Secondary text: {SECONDARY_TEXT}. Accent symbol: {ACCENT_SYMBOL}. Food styling: {WARDROBE_STYLE}. Style fidelity
  anchors: {STYLE_FIDELITY_ANCHORS}. Source content to avoid: {SOURCE_CONTENT_TO_AVOID}. Apply these rules: pure black outer background; a single warm cream irregular cutout card with handmade rounded or
  torn edges; each card silhouette must be visibly different from other cases; dense Chinese street-food ad hierarchy; oversized rough hand-brushed Chinese lettering; realistic clipped food photo collage
  placed on the flat card; bold yuan price medallion with a value that is not 8; tiny vertical side seals and craft labels; deep red bottom ribbon with short white lettering; ochre, mustard, seal red, dark
  brown ink, warm cream paper, paper grain, slight scan softness, subtle card shadow. Match the reference style first, then change the dish, text, prop, card outline, price, and layout details.'
