prompt: 'Create a {ASPECT_RATIO} image in the "Photo Illustration Overlay Poster" style.


  Subject: {SUBJECT}.

  Action: {SUBJECT_ACTION}.

  Prop/Product or interaction object: {PRODUCT_OR_PROP}.

  Location/photo background: {LOCATION}.

  Background details: {BACKGROUND_ELEMENTS}.

  Main text: "{MAIN_TEXT}".

  Secondary text/category: "{SECONDARY_TEXT}".

  Accent doodles and graphic effects: {ACCENT_SYMBOL}.

  Character treatment: {WARDROBE_STYLE}.


  Use a realistic city street photo as the base layer, then composite one oversized flat 2D cartoon character on top. The character should use high-saturation color blocking, rough hand-drawn linework,
  exaggerated scale, simple expressive eyes, playful body proportions, and graphic edges. Add small hand-drawn stars, sparks, arrows, motion lines, comic bursts, and doodle marks around the interaction
  point.


  Keep the background photographic and recognizable. Keep the illustrated character deliberately flat, graphic, and poster-like. Avoid copying any watermark, logo, or exact character from the reference
  image. Avoid plush 3D mascots, full-vector backgrounds, dark gritty mood, cyberpunk, and cluttered small text.'
