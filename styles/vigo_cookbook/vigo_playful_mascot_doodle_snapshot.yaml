prompt: 'Create a {ASPECT_RATIO} image in the "Playful Mascot Doodle Snapshot" style.


  Subject: {SUBJECT}.

  Subject action: {SUBJECT_ACTION}.

  Product or prop: {PRODUCT_OR_PROP}.

  Location: {LOCATION}.

  Background elements: {BACKGROUND_ELEMENTS}.

  Main text: "{MAIN_TEXT}".

  Secondary text: "{SECONDARY_TEXT}".

  Accent symbols: {ACCENT_SYMBOL}.

  Wardrobe or styling: {WARDROBE_STYLE}.


  Use a realistic casual phone-photo scene as the base layer. Keep the environment photographic, naturally lit, and location-specific. Add original flat cartoon mascot stickers on top of the photo: fruit,
  cloud, star, cup, wave, and jelly-shaped characters with simple eyes, thick dark outlines, glossy color blocks, sunny yellow, teal, coral, sky blue, lavender, cream, and soft pink accents. Add a loose
  warm outline around the main subject, plus hand-drawn sparkles, spirals, web lines, stars, arrows, and marker doodles floating over the scene.


  Place the main headline inside a cream or pale-yellow wavy ribbon sticker in the upper third. Use imperfect uppercase hand-lettered marker typography in dark burgundy ink. Keep the main subject''s face,
  product, or focal object unobstructed. The result should feel like a cheerful social-media photo booth collage, not a polished corporate ad.


  Avoid watermark, username, platform logo, QR code, creator signature, licensed character, recognizable franchise costume, superhero emblem, brand logo, exact reference character, copied IP, goggle-eyed
  capsule character, denim overalls, red-blue web-pattern suit, mask, shield, helmet emblem, tiny unreadable text, dense paragraph text, corporate layout, sterile studio render, fully vector background,
  3D plush mascot, photoreal CGI mascot, dark horror mood, gritty dystopian tone, cyberpunk neon scene, face obstruction, distorted hands, and over-sharpened artificial texture.'
