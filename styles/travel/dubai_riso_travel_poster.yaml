prompt: |
  Create a stylish modern travel poster inspired by risography about DUBAI.

  Use simplified illustrated images of the city: the Gwanganje Bridge, ocean waves, seagulls, beach umbrellas, fish baskets at the market, neon street signs and small abstract decorative figures.

  Create a bold, multi-layered risographic poster with imperfect ink design, translucent colors printed on top, graininess in semitones, rough paper texture, flat graphic shapes, playful geometric shapes, and energetic editorial composition.

  Use fluorescent pink, bright blue, warm yellow, orange-red, leafy green, and rich cobalt blue on a white paper background.

  Add bold font in English: Main title: "DUBAI" A subtitle describing the city. The text in the footer: "ARTISTIC PRINTING · COASTAL STORIES · 2026"

  The design should be bright, cultural, modern, playful and collectable, like the original independent risographic poster for a local creative festival.

  Avoid copying any existing poster, artist's style, corporate identity, logo, mascot, copyrighted character, exact layout, or recognizable commercial design. Create an original composition inspired only by risographic printing technologies and modern independent poster design.

  不要水印，不要真实Logo，不要电商广告感。

