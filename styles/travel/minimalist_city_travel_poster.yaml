prompt: "Create an ultra-high-resolution minimalist line-art travel poster of [DESTINATION], portraying the city as a stylish everyday urban scene rather than a tourist postcard. \n\nCORE COMPOSITION: \n\
  - Central composition shows the city's most iconic street, intersection, alley, tram street, or pedestrian avenue \n- Foreground includes locals, commuters, cyclists, travelers, shoppers, students, café\
  \ visitors \n- People should naturally reflect the city's local lifestyle and fashion culture \n- Background filled with realistic local signage, cafés, restaurants, transportation signs, storefronts,\
  \ and architectural details \n- Landmarks should appear naturally integrated into everyday life, never exaggerated \n- Include authentic local-language typography and culturally recognizable visual elements\
  \ \n- Large bold typography at the top center: \"[DESTINATION]\" \n- Subtitle below: local language + country name examples: 東京 JAPAN 서울 KOREA ΚΟΛΩΝΙΑ GERMANY\n\nSTYLE: ultra clean vector illustration,\
  \ Swiss modernist travel poster, minimal line art, monoline drawing, mid-century editorial aesthetic, architectural illustration, Japanese graphic poster style, precise geometric perspective, extremely\
  \ clean negative space, premium travel branding aesthetic\n\nLINE STYLE: \n- monochrome line-based illustration only \n- thin and highly precise linework \n- minimal fill areas \n- intricate city-map-like\
  \ detail density \n- rhythmic layering of signs, buildings, windows, and street objects \n- visually dense yet highly organized composition\n\nCOLOR SYSTEM — VERY IMPORTANT: \n- use only ONE main color\
  \ + ONE background color \n- automatically choose a color that best represents the city's atmosphere \n- monochrome silkscreen poster aesthetic \n- no rainbow palettes \n- no excessive neon \n- color\
  \ should reflect the city's architecture, climate, nightlife, and cultural identity\n\nExamples: \n- Tokyo → vivid red on warm ivory \n- Paris → deep navy on cream \n- New York → charcoal black on light\
  \ gray \n- Kyoto → muted burgundy on warm cream \n- Hong Kong → teal blue on pale ivory \n- Santorini → Mediterranean blue on white \n- Cairo → desert sepia on sand beige\n\nCOMPOSITION: \n- vertical\
  \ poster layout \n- frontal street-level perspective \n- pedestrians crossing streets or moving naturally \n- balanced, elegant, highly detailed"
