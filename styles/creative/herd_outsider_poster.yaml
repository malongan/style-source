name: 异类阵列视觉
category: creative
ratio: '3:4'
source_author: '@YangOnchain'
source_url: 'https://x.com/YangOnchain'
summary: 阵列秩序中的唯一异类，概念海报的视觉焦点。
tags:
- 概念海报
- 异类主题
- 阵列构图
- 编辑海报
- 社交媒体视觉
triggers:
- 异类海报
- 阵列构图
- 概念海报
- 俯视构图
- 群体异类
- 羊群效应
features:
- title: 高角度俯视构图
  desc: 从正上方俯瞰，以俯视/鸟瞰视角构建场景，产生强烈的空间秩序感和平面图案感
- title: 阵列重复
  desc: 大量相同的群体对象以整齐、有秩序、近似阵列的方式分布，形成强烈的重复视觉节奏
- title: 异类焦点
  desc: 在阵列中心放置一个唯一不同的对象，在颜色、材质、方向、身份或状态上明显区别于周围群体
- title: 编辑海报质感
  desc: 真实质感与平面设计感结合，纸张颗粒、轻微胶片噪点、印刷质感、强烈阴影和高级色彩对比
- title: 文字排版系统
  desc: 下方巨大粗重块状中文标题，半透明叠加；上方黑色手写体年份「2026」；小号英文信息；底部英文标语
variables:
- kv_var: 画面-主体
  style_var: '{群体对象}'
  desc: 重复出现的群体，如：白羊 / 红色锦鲤 / 黄色雨伞 / 西装人 / 白色椅子 / 同款汽车 / 机器人 / 工牌员工
- kv_var: 画面-异类
  style_var: '{异类对象}'
  desc: 唯一不同的异类对象，如：黑羊 / 黑色锦鲤 / 蓝色透明雨伞 / 宇航员 / 红色椅子 / 老式自行车 / 人类 / 空白工牌
- kv_var: 画面-场景
  style_var: '{背景场地}'
  desc: 分布场地，如：草地 / 浅蓝水面 / 雨夜广场 / 棕色地面 / 办公大厅 / 沙漠 / 城市天台
- kv_var: 文字-中文标题
  style_var: '{中文标题}'
  desc: 巨大的中文标题，如：异类 / 逆流者 / 破阵 / 不合群 / 反方向 / 出格 / 例外 / 破局
- kv_var: 文字-英文标语
  style_var: '{英文标语}'
  desc: 底部英文标语，如：2026 BREAKS THE HERD. / 2026 SWIMS AGAINST THE FLOW. / 2026 DISRUPTS THE GRID. / 2026 REFUSES THE SYSTEM.
prompt: 生成一张竖版 3:4 的成品概念海报。画面采用高角度俯视构图，主体是大量重复出现的{群体对象}，它们以整齐、有秩序、近似阵列的方式分布在{背景场地}上，形成强烈的重复感、秩序感和图案感。在画面中心放置一个唯一不同的{异类对象}。这个对象在颜色、材质、方向、身份或状态上明显区别于周围群体，成为画面视觉焦点。它象征异类、逆流、不合群、破局、反秩序。画面风格为现代编辑海报、概念艺术海报、社交媒体视觉海报。真实质感与平面设计感结合，有纸张颗粒、轻微胶片噪点、印刷质感、强烈阴影和高级色彩对比。画面下方加入巨大中文标题「{中文标题}」，字体为粗重块状字体，半透明叠加在画面上。标题上方叠加黑色手写风格年份「2026」。标题上方加入小号英文信息："AI
  VISUAL POSTER / CREATIVE SERIES"。底部加入英文标语：「{英文标语}」。文字必须清晰准确，不要乱码。不要水印，不要真实Logo，不要电商广告感，不要卡通风，不要拼贴感，不要复杂背景。
