name: 高明度泡泡字潮流视觉
category: creative
ratio: 16:9 / 3:4 / 9:16
source_author: '@xiaoxiaodong01'
source_url: 'https://x.com/xiaoxiaodong01'
summary: 高明度清透潮流人物视觉，泡泡字 × 像素贴纸 × 复古电脑界面的混合设计。
tags:
- 潮流视觉
- 泡泡字
- 高明度
- 偶像卡
- 复古电脑界面
- 清透风格
triggers:
- 泡泡字海报
- 高明度潮流
- 清透人物视觉
- 偶像卡风格
- 零售活动海报
- 复古电脑界面贴纸
- 试妆海报
features:
- title: 高明度清透色调
  desc: 明亮轻快、清透干净、通风感强的色光状态，不做灰浊旧化处理
- title: 主体抠像人物居中
  desc: 清晰抠像照片或拟真人像置于画面中轴偏前，人物边缘干净，皮肤与服装保留真实光泽
- title: 人物压字咬合
  desc: 身体局部自然压住后方字形，前景人物与后场图形互相咬合
- title: 极大型泡泡字
  desc: 圆鼓、厚重、略带手绘变形，粗黑外轮廓与局部内侧阴影，字腔使用主题主色，表面叠加白色弧形高光、透明渐层
- title: 像素贴纸装饰系统
  desc: 低密度像素弹窗、进度条、条码、棋盘格角标、手绘星芒爱心符号
- title: 色彩系统
  desc: 大面积浅亮底场 + 主题主色泡泡字 + 黑色信息线框 + 白色高光 + 少量高饱和暖色强调
variables:
- kv_var: 画面-比例
  style_var: '{比例}'
  desc: 画布比例，如：16:9、3:4、9:16
- kv_var: 色彩-底场
  style_var: '{底场颜色}'
  desc: 大面积底色，如：浅粉色 / 浅蓝色 / 米白色 / 浅紫色
- kv_var: 色彩-主色
  style_var: '{主题主色}'
  desc: 泡泡字字腔色，从主题提取，如：珊瑚粉 / 薄荷绿 / 亮橙色
- kv_var: 色彩-强调
  style_var: '{强调色}'
  desc: 高饱和点缀色，如：暖粉色 / 柠檬黄 / 电光蓝
- kv_var: 文字-主标题
  style_var: '{主标题}'
  desc: 泡泡字主标题，如：今天试妆不加班 / 夏日限定 / 潮流派对
- kv_var: 文字-副标题
  style_var: '{副标题信息}'
  desc: 窄排小字，如：6.22 周六 / 底妆体验
- kv_var: 文字-标签
  style_var: '{标签信息}'
  desc: 像素字体标签，如：到店送卸妆巾 / NEW ARRIVAL
prompt: '生成一张{比例}的高明度清透潮流人物视觉海报。


  主体以清晰抠像照片或拟真人像置于画面中轴偏前，人物边缘干净、皮肤与服装保留真实光泽，身体局部自然压住后方字形，形成前景人物与后场图形互相咬合的层次。


  画面主标题做成极大尺度泡泡字，圆鼓、厚重、略带手绘变形，粗黑外轮廓与局部内侧阴影提供结构，字腔使用{主题主色}的明亮主色，表面叠加白色弧形高光、透明渐层和轻微亮面质感。整体保持明亮轻快、清透干净、通风感强的色光状态。


  色彩方案：大面积{底场颜色}浅亮底场 + {主题主色}泡泡字 + 黑色信息线框 + 白色高光 + {强调色}少量高饱和暖色强调点 + 中性正文信息。


  画面加入低密度的像素弹窗、细长进度条、条码、棋盘格角标、短小说明文字、姓名标签和手绘星芒爱心符号；这些元素像散落的桌面界面贴纸一样围绕人物与标题分布。


  文字层级：{主标题}为粗体泡泡字，{副标题信息}为窄排小字，{标签信息}用像素字体与手写线条并置。


  整体完成度像偶像卡片、街头贴纸和复古电脑界面的混合设计，边线利落，留白充足，信息装饰有节奏，不把人物淹没在装饰里。


  不要灰浊旧化处理，不要暗淡色调，不要衬线字体，不要水印，不要真实Logo，不要卡通风，不要拼贴感，不要复杂背景。'
