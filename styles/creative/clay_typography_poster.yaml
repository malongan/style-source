name: 黏土文字互动海报
category: creative
ratio: 3:4（竖版）
source_author: '@MissDelulu9'
source_url: ''
summary: 可爱黏土3D角色与巨型粗体文字互动，通过肢体动作表达文字含义，极简背景突出主体。
tags:
- 黏土
- 3D
- 文字互动
- 极简
- 创意海报
- GPTImage2
triggers:
- 黏土文字
- 黏土海报
- 粘土字体互动
- 3D黏土角色
- 黏土字效
features:
- title: 黏土手工质感
  desc: 手作塑料黏土/软陶质感，手工雕塑感，哑光磨砂表面，逼真的手工工艺美学，如黏土动画电影中的角色
- title: 巨型文字互动
  desc: 超大粗体黑色文字填满背景，角色与文字自然互动（坐在字母上、攀爬、悬挂、穿过），文字即视觉主体
- title: 极简干净构图
  desc: 白色无缝演播室背景，居中构图，柔和漫射棚拍灯光，精致写实的阴影，画面干净高级
- title: 可爱角色设计
  desc: 圆润比例、小圆点眼睛、简单面部特征、超大运动鞋、俏皮表情、动态姿势、活力十足
- title: 色彩丰富鲜艳
  desc: 鲜艳色彩、现代平面海报设计、高级质感、8K精细度
variables:
- kv_var: '{文字}'
  style_var: '{WORD}'
  desc: 画面中出现的单词文字 — 如 RUN、JUMP、FLY、LOVE、DREAM
- kv_var: '{动作}'
  style_var: '{ACTION}'
  desc: 角色与文字的互动方式 — 如 sitting on the 'R'、climbing up the 'U'、hanging from the 'N'
- kv_var: '{服装}'
  style_var: '{OUTFIT}'
  desc: 角色的穿着风格 — 如 a denim jacket and red sneakers、a yellow raincoat and boots
prompt: Minimalist 3D clay illustration of a cute stylized cartoon character creatively interacting with giant bold black typography reading "{WORD}". The character is {ACTION}, naturally using, sitting
  on, hanging from, climbing, or moving through the letters to express the meaning of "{WORD}". Handcrafted plasticine/clay texture, handmade sculpted look, rounded proportions, tiny dot eyes, simple facial
  features, oversized sneakers, wearing {OUTFIT}, playful expression, dynamic pose, soft matte finish, vibrant colors, modern graphic poster design, giant bold black typography filling the background, clean
  centered composition, white seamless studio background, soft diffused studio lighting, subtle realistic shadows, premium clay animation aesthetic, highly detailed, charming, cute, ultra-realistic handcrafted
  look, 8K, one character only, minimal, clean, high-end poster.
