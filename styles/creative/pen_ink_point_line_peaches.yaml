summary: 通过无数细密短促的钢笔线条排列与交叉，用**粉色线条**塑造桃子的形体与质感，用**绿色线条**塑造枝叶，呈现极度精细的植物线描插画风格。
tags:
- 钢笔画
- 点线技法
- 精细描绘
- 植物插画
