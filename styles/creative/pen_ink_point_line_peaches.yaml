- 钢笔点线桃子
- 精细描绘桃子
- 点线技法插画
features:
- title: ✏️ **纯钢笔点线**：完全通过细密短促的钢笔线条排列与交叉来表现，无任何色块填充
  desc: ''
- title: 🍑 **粉色塑造桃体**：用粉色线条（点线技法）来塑造桃子的形体、质感与光影
  desc: ''
- title: 🌿 **绿色塑造枝叶**：用绿色线条（点线技法）来塑造枝叶的脉络、纹理与层次
  desc: ''
- title: 📐 **线条遵循形态**：线条走向紧紧遵循桃子与枝叶的形态，展现蓬勃的生命力
  desc: ''
- title: ✍️ **手写签名**：画面角落有手写风格签名 GioKing
  desc: ''
- title: 🔬 **极度精细**：完全通过线条密度变化表现光影，而非传统绘画手法
  desc: ''
variables: []
prompt: '整体：极度精细的钢笔线描插画，2:3竖版构图，{{主体数量}}颗桃子。

  主体：{{主体描述：桃子（表皮绒毛质感，通过粉色短促线条排列交叉来表现形体与质感，暗部线条更密集，亮部稀疏）；枝叶（通过绿色细密线条来塑造叶脉纹理与层次感）。}}

  点缀：{{画面点缀：可有可}}无，{{若有则描述}}。

  签名：右下角手写签名"GioKing"。'
