name: 像素切割社区活动海报
category: creative
ratio: 16:9 / 3:2 / 4:3
source_author: '@xiaoxiaodong01'
source_url: 'https://x.com/xiaoxiaodong01'
summary: 像素切割大标题 × 黑白摄影主体 × 斜切明亮色场，冷静精确的社区活动视觉系统。
tags:
- 像素字体
- 黑白摄影
- 几何色块
- 活动视觉
- 展览海报
- 社区夜校
- 清透构图
triggers:
- 像素切割海报
- 黑白主体活动视觉
- 像素字体标题
- 斜切色块
- 社区夜校
- 活动公告海报
features:
- title: 像素切割标题
  desc: 顶部横贯大字号标题，字体呈低分辨率像素切割感，笔画被网格拆成方块并在局部断裂，少量主题明亮强调色嵌在笔画端点、转折和缺口中
- title: 黑白摄影主体
  desc: 主体以黑白或近单色摄影质感出现，放在中上部偏一侧，边缘平直干净，人物/物件被处理成冷静、克制、可信的焦点
- title: 斜切明亮色场
  desc: 另一侧由大面积高明度几何色块斜向穿过，像明亮的结构底板托住信息与图像，制造强烈的图文拼接压力
- title: 展览海报排版
  desc: 主标题巨大且靠近边缘，英文或辅助短句细小无衬线分行排列，核心名称可被方括号式细线框住，字号差异明确，留白与拥挤并存
- title: 色彩系统
  desc: 大面积干净浅色背景 + 清晰中性色结构 + 少量高饱和强调色 + 黑色信息文字，色阶分明
variables:
- kv_var: 画面-比例
  style_var: '{比例}'
  desc: 画布比例，如：16:9、3:2、4:3
- kv_var: 画面-主题
  style_var: '{主题}'
  desc: 活动主题，如：社区夜校开放课 / 城市论坛 / 艺术讲座
- kv_var: 画面-主体
  style_var: '{主体内容}'
  desc: 主体描述，如：一位成年人整理笔记 / 讲者与听众 / 展览空间
- kv_var: 色彩-背景
  style_var: '{背景色}'
  desc: 大面积底色，如：米白 / 浅灰 / 暖白 / 淡蓝
- kv_var: 色彩-色场
  style_var: '{色场颜色}'
  desc: 斜切色块色，如：珊瑚橙 / 天蓝 / 薄荷绿 / 明黄
- kv_var: 色彩-强调
  style_var: '{强调色}'
  desc: 像素字体强调色，如：橙色 / 湖蓝 / 绿松石
- kv_var: 文字-主标题
  style_var: '{主标题}'
  desc: 像素切割大标题，如：社区夜校开放课 / 城市观察论坛
- kv_var: 文字-副标题
  style_var: '{副标题}'
  desc: 细小分行文字，如：6月28日 19:30 / 河岸文化客厅
- kv_var: 文字-辅助
  style_var: '{辅助信息}'
  desc: 分组信息，如：电影、植物、城市散步 / 三门试听
prompt: '围绕{主题}生成一张强信息层级的{比例}活动视觉。


  画面先读到顶部横贯的大字号标题，字体呈低分辨率像素切割感，笔画像被网格拆成方块并在局部断裂，{强调色}少量主题派生的明亮强调色嵌在笔画端点、转折和缺口中，形成精确的视觉噪点。


  主体图像以黑白或近单色摄影质感出现，放在画面中上部偏一侧，边缘平直干净，{主体内容}被处理成冷静、克制、可信的焦点；另一侧由大面积{色场颜色}高明度几何色块斜向穿过，像一张明亮的结构底板托住信息与图像，制造强烈的图文拼接压力。


  色彩从主题自身的材质、文化语境和情绪中提取：大面积干净{背景色}浅色背景 + 清晰中性色结构 + 少量高饱和{强调色} + 黑色信息文字。整体保持明亮、清透、洁净、冷静精确，色阶分明。


  信息排版采用展览海报式秩序：主标题"{主标题}"巨大且靠近边缘，{副标题}以细小无衬线分行排列，核心主题名称可被方括号式细线框住，{辅助信息}分成疏密不同的信息组。底部可加入细小机构标识带或符号信息，保持低存在感。


  整体完成度像专业文化论坛、建筑讲座或城市公共议题的视觉系统：图形锋利、边界清楚、没有装饰性插画堆叠，重点是像素标题、黑白主体图像、斜切明亮色场和严谨信息排版之间的紧张关系。


  不要装饰性插画堆叠，不要灰浊暗调，不要柔光虚化，不要衬线字体，不要水印，不要真实Logo，不要拼贴感。'
