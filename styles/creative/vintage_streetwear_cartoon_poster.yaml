name: 复古街头卡通海报
category: creative
ratio: 1:1 / 3:4 / 9:16 / 16:9
source_author: '@poletaeviktor'
source_url: ''
summary: 1930年代弗莱舍动画美学 × 街头涂鸦泡泡字 × 单色复古印刷质感，让品牌核心产品化身调皮卡通角色，呈现复古街头海报的叛逆幽默感。
tags:
- 街頭復古
- 單色海報
- 1930s動畫
- 塗鴉字體
- 弗萊舍風格
- 潮流設計
triggers:
- 复古街头海报
- 涂鸦卡通海报
- 1930s动画海报
- 弗莱舍风格
- 单色复古海报
- Streetwear品牌海报
features:
- title: 1930s弗莱舍动画美学
  desc: 粗黑轮廓线、平涂填充、夸张变形的卡通比例，灵感来自 Fleischer Studios 的复古动画风格，角色表情生动俏皮、带一丝狡黠
- title: 涂鸦泡泡字
  desc: 品牌名称以连续的涂鸦泡泡字横向排列，从左到右一气呵成，字母全连接不断行，不堆叠、不换行
- title: 单色复古印刷质感
  desc: 米白/暖灰旧纸张纹理背景（老报纸、古旧杂志、凸版印刷纸），整体为单色或双色构图，呈现复古丝网印刷或凸版印刷效果
- title: 产品拟人化
  desc: 品牌最具标志性的核心产品以卡通角色形象出现，被赋予生命和个性，而非干净的产品渲染图
- title: 品牌标语
  desc: 底部以小号压缩大写字体放置品牌标志性的挑衅/宣言式标语，一到两行，语气坚定
- title: 禁熔融滴落
  desc: 产品周边不使用任何滴落、融化、流动效果，产品为干净的固体图形对象
variables:
- kv_var: 画面-比例
  style_var: '{比例}'
  desc: 画面比例，如：3:4 / 1:1 / 9:16 / 16:9
- kv_var: 画面-主体
  style_var: '{核心产品}'
  desc: 品牌最具标志性的产品，以卡通角色形式出现，如：运动鞋 / 耳机 / 饮料罐 / 背包 / 潮玩公仔
- kv_var: 画面-色系
  style_var: '{色系选择}'
  desc: 单色或双色调色系，如：黑白 / 藏蓝米白 / 墨绿米白 / 酒红米白 / 深棕米白
- kv_var: 文字-品牌标语
  style_var: '{标语文字}'
  desc: 品牌标志性宣言式标语，如：WE ARE THE FUTURE / STAY DIFFERENT / ORIGINAL SINCE 2015 / CULT FOLLOWING ONLY
prompt: '生成一张{比例}的单色复古风格街头品牌海报。整体采用米白或暖灰旧纸张纹理背景，呈现老报纸、古旧杂志或凸版印刷纸的质感，纹理清晰可见。


  品牌名称以连续的涂鸦泡泡字体横向排列在画面醒目位置，字母全部连接，从左到右一气呵成，不堆叠、不断行。


  品牌最核心的标志性产品{核心产品}以1930年代弗莱舍动画风格的卡通角色形象绘制在画面中——粗黑轮廓线、平涂填充色、夸张变形的卡通比例。这个产品被赋予了个性和表情：它看起来是活的，带着一丝俏皮和狡黠，像是一个调皮的角色，而不是干净的产品渲染图。它不用任何滴落、融化或流动效果，保持干净的固体图形外观。


  画面整体为单色或双色调配色{色系选择}，用厚实的黑色轮廓线连接所有图形元素，呈现复古丝网印刷或凸版印刷的质感。


  底部以小号压缩大写字体放置品牌标语「{标语文字}」，一到两行，语气坚定、宣言式。


  不要水印，不要真实Logo，不要电商广告感，不要卡通风（可爱型），不要拼贴感，不要复杂背景，不要乱码，不要滴落或融化效果。'
