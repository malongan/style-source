prompt: |
  Poster, pure black background. Composition is dominated by a massive, sprawling chrome liquid-metal form with an indeterminate, ever-shifting shape — neither clearly an arch, nor a portal, nor any recognizable object, just an amorphous mass of twisting, melting tendrils and bulging liquid folds that spill toward the edges of the frame. Surface ripples with iridescent green, violet, and amber reflections, wet-looking and organic, like poured mercury frozen mid-motion, its silhouette ambiguous and constantly suggesting different forms depending on where you look. Small negative-space gaps within the sprawling mass reveal glimpses of the black background beneath. Centered within one of these gaps, elegant orange italic script typography reads 'Verglas' as the main title. Below it, small orange serif text arranged in short poetic stanzas: 'They arrive without knocking, / without asking if you were ready. / Close your eyes — can you still feel them? / They belong more to the in-between than to either side.' followed by a smaller line 'Les Ombres.' and a final stanza: 'It has been so long that the idea trembles and slips between my fingers, / why does it still smell of ash and distance? / Perhaps it was never meant to be looked at directly, / only felt in the corner of the imagined.' Deep black background, sprawling glossy chrome-green sculptural mass filling most of the composition, warm orange type as the only accent color, moody surreal atmosphere.
  不要水印，不要真实Logo，不要电商广告感。

