triggers:
- 芒果椰乳海报
- 涂鸦饮料海报
- 手绘饮品菜单
- 夏季饮品
- 手写涂鸦饮品
- 芒果冰饮海报
features:
- title: 透明玻璃杯实拍感
  desc: 杯壁透明、底部有小料和乳感基底，上方有柔软奶色云雾层 + 芒果浓缩色 + 冰块泡沫
- title: 粗黑手绘涂鸦叠加
  desc: 厚实松弛的黑色手写词、弧形箭头、短促放射线、虚线杯身轮廓标注，像随手课堂笔记
- title: 浅色柔软背景
  desc: 桌面与布料轻量支撑，远处虚化器皿和制作道具，不影响杯子视觉重量
- title: 真实与手绘反差
  desc: 实拍饮品质感 × 幼拙线描手写，形成可爱记忆点
variables:
- kv_var: 画面-比例
  style_var: '{比例}'
  desc: 画布比例，如：16:9、9:16
- kv_var: 饮品-名称
  style_var: '{饮品名称}'
  desc: 主饮品名，如：芒果椰乳冰饮 / 生椰拿铁
- kv_var: 饮品-底部
  style_var: '{底部内容}'
  desc: 底部小料，如：椰果 / 珍珠 / 寒天晶球
- kv_var: 饮品-基底
  style_var: '{基底质感}'
  desc: 基底描述，如：椰乳 / 牛乳 / 燕麦奶
- kv_var: 饮品-顶部
  style_var: '{顶部云雾层}'
  desc: 奶盖/云雾层，如：奶色云雾 / 芝士奶盖
- kv_var: 饮品-风味色
  style_var: '{风味浓缩色}'
  desc: 颜色层，如：芒果浓缩色 / 草莓红
- kv_var: 背景-描述
  style_var: '{背景描述}'
  desc: 如：浅粉色棉麻桌布 / 原木色桌面
- kv_var: 文字-手写词
  style_var: '{手写词}'
  desc: 涂鸦文字，如：芒果椰乳 / Mango Coconut / 夏日特饮
prompt: '生成一张{比例}的明亮清透饮品摄影图片。


  主体是一杯真实的{饮品名称}冰饮，透明玻璃杯近距离实拍。杯壁透明、底部有{底部内容}和{基底质感}基底，上方有柔软的{顶部云雾层} + {风味浓缩色} + 冰块泡沫。


  浅色柔软的{背景描述}生活化背景，桌面与布料轻量支撑，远处虚化的器皿和制作道具（不能抢走杯子视觉重量）。


  将真实饮品与粗黑手绘信息涂鸦叠加：用厚实松弛的黑色手写词"{手写词}"、弧形箭头、短促放射线、虚线杯身轮廓标注，像随手课堂笔记一样的可爱手作感。


  整体保持明亮清透、色阶清晰。不要暗淡色调，不要灰浊旧化，不要水印，不要真实Logo，不要复杂背景，不要衬线字体。'
