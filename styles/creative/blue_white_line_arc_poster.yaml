# 蓝白线弧海报

id: blue_white_line_arc_poster
name: "蓝白线弧海报"
category: creative

tags:
  - 概念海报
  - 极简设计
  - 线条结构
  - 视觉实验
  - 公共设计

triggers:
  - 蓝白海报
  - 线条海报
  - 极简海报
  - 弧形构图
  - 人物剪影海报
  - 视觉实验海报

features:
  - "**连续线条结构** — 大量蓝色/白色平行线组成巨大弧形结构，如坡道、桥梁、波浪、隧道、数据桥，形成强烈的空间秩序和未来感"
  - "**人物剪影叙事** — 白色或蓝色小人物剪影沿结构行走、攀登、牵引、仰望远眺，成为画面尺度参照和故事锚点"
  - "**蓝白极简配色** — 深蓝 + 纯白为主色调，少量浅蓝/灰蓝渐变过渡，营造理性、克制、冷静的气质"
  - "**强留白构图** — 大面积的留白空间与线条结构形成疏密对比，增强画面的呼吸感和平面设计感"
  - "**现代中文排版** — 中文主标题 + 英文副标题 + 日期角标「视觉实验海报 X」的排版体系，干净清晰"

scene: "品牌KV、概念海报、文化展览海报、视觉实验海报、科技发布会海报"
ratio: "3:4"
summary: "蓝白极简的平行线弧形结构 + 人物剪影 + 现代排版，营造理性克制、充满空间秩序的未来感视觉。"

prompt: |
  生成一张竖版 3:4 的概念海报。画面以大量蓝色和白色平行线组成巨大的{弧形结构}，线条流畅连贯，形成强烈的空间秩序感和未来感。{人物行为}的白色或蓝色小人物剪影分布在结构上，成为尺度的参照和故事的锚点。配色以深蓝和纯白为主，搭配少量浅蓝/灰蓝渐变过渡。大面积的留白与线条结构形成疏密对比。画面中加入中文主标题「{中文标题}」，下方搭配英文副标题「{英文标题}」，角落标注「视觉实验海报 X · 2026.07.07」。整体气质理性、克制、冷静，充满公共设计感和未来主义色彩。
  不要水印，不要真实Logo，不要电商广告感，不要卡通风，不要拼贴感，不要复杂背景，不要写实照片风格。

variables:
  - kv_var: 画面-结构
    style_var: '{弧形结构}'
    desc: 线条构成的主体结构，如：坡道 / 桥梁 / 波浪 / 隧道 / 数据桥 / 无限环 / 螺旋坡道 / 拱门
  - kv_var: 画面-人物
    style_var: '{人物行为}'
    desc: 人物剪影的动作状态，如：沿坡道向上行走 / 攀登弧形结构 / 牵引绳索前进 / 仰望远眺 / 并肩前进 / 奔跑跨越
  - kv_var: 文字-中文标题
    style_var: '{中文标题}'
    desc: 中文主标题，如：秩序 / 桥梁 / 破浪 / 远行 / 向上 / 连接 / 轨迹 / 跨越
  - kv_var: 文字-英文标题
    style_var: '{英文标题}'
    desc: 英文副标题，如：ORDER IN MOTION / BRIDGE TO THE FUTURE / WAVES OF PROGRESS / THE PATH AHEAD / BEYOND THE ARC

source_url: "https://x.com/YangOnchain/status/2074355569016865118?s=20"
source_author: "@YangOnchain"

