name: 青柠薄荷涂鸦手绘饮料海报
category: creative
ratio: 16:9 / 9:16
source_author: '@xiaoxiaodong01'
source_url: ''
summary: 清爽青柠薄荷气泡饮 × 粗体标题广告节奏 × 手绘蜡笔线条托举杯底，真实与线描的反差记忆点。
tags:
- 青柠薄荷
- 气泡饮
- 手绘托举
- 粗体标题
- 夏季清爽
- 广告式节奏
- 饮品上新
triggers:
- 青柠薄荷海报
- 气泡饮料海报
- 手绘托举杯
- 清爽夏日饮品
- 上新海报
- 手作感饮料视觉
features:
- title: 粗体标题+广告式节奏
  desc: 画面上方大号粗体标题，字形紧凑笔触厚实字距打开，下方接一行或两行等宽说明文字，形成干净广告式节奏
- title: 真实冰饮质感
  desc: 玻璃杯边缘清晰，冰块通透高光，饮品有明显分层流动和透明层次
- title: 手绘蜡笔托举杯底
  desc: 杯子下方用粗颗粒手绘线条画出一只托举饮品的手，线条来自主题饮品结构色，边缘带蜡笔粉笔般的干燥颗粒
- title: 两侧短句+稀疏排版
  desc: 主体周围大量通风感留白，两侧短句式信息文字像产品洞察，对齐克制
- title: 真实×线描反差
  desc: 真实拍摄饮品质感与幼拙线描手绘之间的反差记忆点
variables:
- kv_var: 画面-比例
  style_var: '{比例}'
  desc: 画布比例，如：16:9、9:16
- kv_var: 饮品-名称
  style_var: '{饮品名称}'
  desc: 如：青柠薄荷气泡饮 / 西柚气泡水
- kv_var: 文字-主标题
  style_var: '{主标题}'
  desc: 大号粗体标题，如：LIME MINT / 青柠薄荷
- kv_var: 文字-说明
  style_var: '{说明文字}'
  desc: 等宽小字，如：Sparkling Refresher / 清爽上新
- kv_var: 文字-两侧
  style_var: '{两侧文字}'
  desc: 两侧短句，如：0糖0脂 / 清爽一夏
- kv_var: 文字-标识
  style_var: '{标识文字}'
  desc: 底部小标识，如：NEW / SUMMER EDITION
- kv_var: 饮品-分层
  style_var: '{分层描述}'
  desc: 如：浅绿色清透分层 / 薄荷绿渐变
- kv_var: 饮品-风味色
  style_var: '{风味颜色}'
  desc: 如：青柠绿 / 薄荷绿
- kv_var: 手绘-结构色
  style_var: '{结构色}'
  desc: 线描手绘颜色，如：青柠绿结构色 / 薄荷色
- kv_var: 色彩-强调
  style_var: '{强调色}'
  desc: 小面积暖色点缀，如：青柠黄 / 暖橙色
- kv_var: 色彩-背景
  style_var: '{背景色}'
  desc: 背景色，如：米白 / 浅暖白 / 淡雪青色
prompt: '围绕{饮品名称}生成一张清爽、明亮、带轻微手作感的{比例}饮料视觉。


  画面上方用大号粗体标题"{主标题}"建立第一阅读层级，字形紧凑、笔画厚实、字距打开，下方接一行或两行更小的等宽说明文字"{说明文字}"，形成干净的广告式节奏。


  主体是一杯真实拍摄质感的冰饮，放在画面中部偏下的位置。玻璃杯边缘清晰，冰块通透高光，饮品有明显{分层描述}的液体分层、流动和透明层次，{风味颜色}颜色集中在杯口和上层，浅色液体作为大面积清透基底。


  主体周围保留大量通风感留白，两侧放置"{两侧文字}"短句式信息文字，像产品洞察而不是装饰说明，排版稀疏、对齐克制。


  杯子下方用粗颗粒的手绘线条画出一只托举饮品的手，线条来自{结构色}，边缘带蜡笔粉笔般的干燥颗粒，手掌以夸张轮廓承托杯底，形成真实饮品与幼拙线描之间的反差记忆点。局部加入一小块{强调色}暖色强调，面积很小，只服务于节奏和视线停顿。


  色彩从饮品自身的材料、风味和情绪中提取：背景保持{背景色}高明度、干净、轻微暖意的结构场。整体保持明亮轻快、清透新鲜，色阶清晰，饱和度集中在饮品和少量强调处。


  底部放置一个极简小标识"{标识文字}"，尺寸克制，作为收口。


  不要灰旧浑浊、不要厚重阴影、不要衬线字体、不要水印、不要真实Logo、不要卡通风。'
