triggers:
  - 极简手绘纪念卡
  - 婚礼请柬手绘
  - 单线条插画
  - 手写体排版
  - 留白仪式感

features:
  - "**清洁留白构图** — 大面积通风留白承托中央单线条小剧场，主题被提炼成可站立、可托举的象征主形"
  - "**极简连续线条** — 只用几笔深色线条勾出主体动作，轻快，带不稳定的平衡感，边缘有真实手绘的轻微抖动和墨迹浓淡"
  - "**双层文字层级** — 顶部保留一行小字距短句作为轻声提示，底部用粗细不匀的手写体写主标题，更小无衬线字放日期/地点"
  - "**轻盈仪式感色彩** — 大面积高明度干净底色、细黑或主题深色线条、极少量强调色，整体明亮清透轻柔"
  - "**主题派生符号** — 星点式闪光、弧形与短横的简化笔法，悬浮在空白里形成轻盈仪式感但不填满背景"

scene: "婚礼请柬封面、订婚纪念卡、社交平台婚礼预告、电子邀请函首图"
ratio: "9:10 竖版"
summary: "以大面积留白和单线条手绘，将婚礼/纪念主题提炼为极简象征图形，搭配手写体文字层，呈现轻盈有仪式感的纪念卡片视觉"

prompt: |
  围绕任意主题对象生成一张极简手绘纪念卡：画面以大片通风留白承托中央单线条小剧场，主题被提炼成一个可站立、可托举的象征主形，上方放置一组极小的叙事角色或主题派生的互动姿态，只用几笔连续深色线条勾出，动作轻快，带一点不稳定的平衡感；主形下方延展成细长支撑和手写字母式符号，使中心从叙事插画自然过渡到信息标识。周围只点少量主题派生的小符号，采用星点式闪光、弧形与短横的简化笔法，悬浮在空白里形成轻盈仪式感，但不填满背景。顶部保留一行很小、字距拉开的短句作为轻声提示，底部用粗细不匀的手写体写主要名称或主题标题，再以更小的整齐无衬线文字放日期、地点或简短说明；文字内容随主题生成，层级必须清楚，手写标题是第一文字重心，插画是视觉重心。色彩从主题自身的材质、情绪和场合中提取，只保留大面积高明度干净底色、细黑或主题深色线条、极少量清晰强调色的角色关系；整体保持明亮、清透、洁净、轻柔而有仪式感，线条边缘有真实手绘的轻微抖动和墨迹浓淡，背景可有非常淡的纸面温度但不能变脏、复古发黄或厚重。

  ——————
  【场景变量】婚礼主题: 新人托举星月+月牙+星点+手写姓名，邀请用途: 婚礼请柬封面，需要出现: 新人姓名+婚礼日期地点+WE'RE GETTING MARRIED+竖版 9:10
  纪念/订婚主题: 订婚仪式+举杯托月+戒指符号+星光祝福，发布场景: 社交平台婚礼预告图，补充要求: 双人小剧场+姓名首字母+简短英文提示+竖版 9:10

  不要水印，不要真实Logo，不要电商广告感，不要厚重复古，不要脏旧发黄，不要拼贴感。

variables_guide:
  - variable: "{主题主形}"
    desc: "画面中央的象征性主形，可站立、可托举"
    example: "新人托举星月、举杯托月、爱心"
  - variable: "{叙事角色}"
    desc: "主形上方放置的极小叙事人物或互动姿态"
    example: "双人小剧场、求婚剪影、拥抱"
  - variable: "{主标题}"
    desc: "底部手写体标题"
    example: "JUST MARRIED、SAVE THE DATE"
  - variable: "{日期地点}"
    desc: "底部无衬线小字"
    example: "2026.10.01 西湖·索菲特酒店"
  - variable: "{强调色}"
    desc: "主题派生的小面积强调色"
    example: "香槟金、浅粉、淡蓝"

