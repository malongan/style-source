name: 透明概念海报
category: creative
ratio: 3:4（竖版）
source_author: '@YangOnchain'
source_url: 'https://x.com/YangOnchain'
summary: 以「透明」为核心概念的展览级海报风格，将透明/半透明/玻璃材质融入具体主题，配合完整中文排版形成高级平面设计方向。
tags:
- 透明
- 概念海报
- 中文排版
- 展览海报
- 平面设计
- 玻璃质感
triggers:
- 透明海报
- 概念海报
- 展览海报
- 玻璃质感海报
- 中文排版海报
- 透明材质设计
features:
- title: 透明材质美学
  desc: 主体使用透明、半透明、玻璃感、树脂感、凝胶感、轻盈漂浮感、切片感或剖面感材质，通透干净且有方向性
- title: 完整中文排版
  desc: 必须包含清晰中文标题、辅助副标题、展览/说明信息、时间信息、地点信息、补充小字模块，呈现真实存在的设计展海报质感
- title: 视觉中心明确
  desc: 画面需要清晰的主题对象，通过材质、构图、色彩和排版形成独立设计方向
- title: 高级平面设计感
  desc: 材质通透、画面干净、构图有设计感，避免电商感、普通宣传页、廉价3D和杂乱
- title: 多种版式可切换
  desc: 大标题主导型 / 图像主导型 / 杂志内页型 / 图鉴式标注型 / 标本式编目型 / 实验展海报型，可根据主题自由变化
variables:
- kv_var: 画面-主体
  style_var: '{主体元素}'
  desc: 海报的核心视觉物体，需用透明材质呈现，如：透明玻璃花瓶、树脂凝胶花朵、切片水晶几何体
- kv_var: 主题方向
  style_var: '{主题方向}'
  desc: 具体的透明主题方向，如：透明与记忆、透明城市、透明生态、透明结构
- kv_var: 文字-主标题
  style_var: '{主标题}'
  desc: 大号中文主标题，如：透明城市、玻璃之诗、看得见的声音
- kv_var: 文字-副标题
  style_var: '{副标题}'
  desc: 辅助副标题，英文/中文均可，如：City of Transparency
- kv_var: 文字-说明
  style_var: '{补充说明}'
  desc: 补充说明小字内容，如：2026 春季展览系列 / 策展人：XXX
- kv_var: 文字-时间
  style_var: '{时间}'
  desc: 展览/活动时间信息，如：2026.07.15 — 08.30
- kv_var: 文字-地点
  style_var: '{地点}'
  desc: 展览/活动地点，如：上海当代艺术博物馆 3F
- kv_var: 版式-方向
  style_var: '{版式方向}'
  desc: 可选：大标题主导型 / 图像主导型 / 杂志内页型 / 图鉴式标注型 / 标本式编目型 / 实验展海报型
prompt: '生成一张竖版 3:4 的中文高质量概念海报，必须是一张已经完成中文排版的成品海报。


  海报主题围绕"透明"展开，但不是单纯做透明材质，而是将"透明"作为一个核心概念融入到具体主题之中，形成具有明显方向性的展览海报 / 杂志封面 / 视觉图鉴 / 概念设计海报。


  整体风格要求：高级平面设计感、中文排版完整、视觉中心明确、主题鲜明、材质通透、画面干净、构图有设计感。


  【核心要求】围绕"透明"这个关键词，把主体做成透明、半透明、玻璃感、树脂感、凝胶感、轻盈漂浮感、切片感或剖面感。画面需要有清晰的主题对象，并通过材质、构图、色彩和排版形成独立方向。


  【排版要求】必须包含清晰中文标题、辅助副标题、展览/说明信息、时间信息、地点信息、补充小字模块。整体像真实存在的设计展海报、视觉艺术海报或实验刊物封面。可加入少量英文辅助，但不能英文主导。中文必须清晰准确，不要乱码。


  【版式方向】{版式方向}


  【主题方向】{主题方向}

  【主标题】{主标题}

  【副标题】{副标题}

  【主体元素】{主体元素}

  【补充说明】{补充说明}

  【时间】{时间}

  【地点】{地点}'
