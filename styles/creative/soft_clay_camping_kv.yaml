prompt: '整体：创意活动主视觉海报，软胶黏土 3D 卡通风格，哑光毛绒草地底座，马卡龙清新配色，浅灰白底色，潮流美式大字排版，潮流海报版式。

  主体：米白双层小房子（{{屋顶颜色}}坡屋顶，墙面手写{{墙面文字}}），房子侧边伸出肉粉色卡通手掌，手背印{{贴纸文字}}，手托蓝色浮雕{{飞盘文字}}字样飞盘；左侧{{花朵颜色}}黏土花朵，右上绿色拟人怪趣海星植物，房内探出带双眼的{{帐篷颜色}}三角露营帐篷，屋内塞满蓬松白色云朵。

  点缀：红/黄四角星装饰、迷你黄花，画面顶部超大粗体蓝色{{主标题}}艺术字，柔光渲染，细腻软胶质感，低饱和度 ins 风，商业宣传海报，8K 高清。画面上方有极小极细无衬线字体"{{装饰文字1}}"、"{{装饰文字2}}"，极小左下角标注"{{品牌名}}" 右下角标注"{{标语}}"。'
