features:
- title: 有机圆角窗口
  desc: 主体以近距离局部放大呈现，放入边角圆润、底部略有柔和起伏的窗口中，窗口外保留大面积干净留白与细腻纸质肌理
- title: 前后层次
  desc: 前景略虚化，中景最清晰，后景被柔光和透明材质轻轻压住；半透明包裹层从画面一侧斜向掠过并遮挡部分主体
- title: 极简排版
  desc: 上方纤细数字日期，局部文字沿弧线轻轻围绕主体，底部大号中文短句 + 紧凑英文标题 + 小段说明文字，字重从细到粗形成阅读顺序
- title: 色彩系统
  desc: 大面积高明度低杂质底色 + 主题柔和主色 + 强调色只在焦点附近出现，深色只承担信息和轮廓功能
- title: 晨光包裹感
  desc: 半透明包裹层、纸张层或薄膜层斜向掠过，形成被晨光包裹的轻盈感
variables:
- kv_var: 画面-比例
  style_var: '{比例}'
  desc: 画布比例，如：16:9、3:4、9:16
- kv_var: 画面-主题
  style_var: '{主题}'
  desc: 画面主题，如：早安问候 / 夏日记忆 / 美好一天
- kv_var: 色彩-底色
  style_var: '{底色}'
  desc: 大面积底色，如：暖白 / 米杏 / 浅粉 / 象牙白
- kv_var: 色彩-主题色
  style_var: '{主题色}'
  desc: 主体颜色，如：橙色系 / 珊瑚 / 暖黄 / 薄荷
- kv_var: 色彩-强调色
  style_var: '{强调色}'
  desc: 小面积点缀，如：橘红 / 芒果黄 / 玫瑰粉
- kv_var: 文字-日期
  style_var: '{日期文字}'
  desc: 纤细日期，如：2026-06-21 / SUMMER SOLSTICE
- kv_var: 文字-关键词
  style_var: '{主题关键词}'
  desc: 弧形环绕文字，如：早安 / Good Morning
- kv_var: 文字-主标题
  style_var: '{主标题}'
  desc: 大号中文短句，如：夏至快乐 / 早安美好
- kv_var: 文字-英文
  style_var: '{英文标题}'
  desc: 紧凑英文标题，如：HAPPY FATHER'S DAY
- kv_var: 文字-说明
  style_var: '{说明文字}'
  desc: 小段说明，如：愿今天充满阳光与温暖
prompt: '围绕{主题}生成一张清透、明亮、带晨间仪式感的{比例}图文画面。


  主体影像占据视觉中心，以近距离局部放大呈现，放入一个边角圆润、底部略有柔和起伏的有机窗口中，窗口外保留大面积干净留白与细腻纸质肌理。


  主题对象内部要有前后层次：前景略虚化，中景最清晰，后景被柔光和透明材质轻轻压住。加入由主题派生的半透明包裹层、纸张层或薄膜层，让它从画面一侧斜向掠过并遮挡部分主体，形成被晨光包裹的轻盈感。


  画面信息以极简排版组织：上方或边缘放置{日期文字}纤细数字日期，{主题关键词}文字沿弧线轻轻围绕主体，底部设置大号中文短句"{主标题}"、紧凑英文标题"{英文标题}"和"{说明文字}"小段说明文字，字重从细到粗形成清楚阅读顺序。辅以一两条细线椭圆轨迹和小型星芒符号制造轻微律动。


  色彩从主题自身的材质、季节和情绪中提取：大面积底色保持{底色}高明度、低杂质、通风感，主体使用清晰而柔和的{主题色}主题色，{强调色}强调色只在焦点与文字附近小面积出现，深色只承担信息和轮廓功能。整体保持明亮轻快、干净清透、色阶清晰，纸感只是细腻背景触感。


  最终效果像一张安静但有呼吸感的日常问候图文，摄影质感与平面排版自然融合，主体窗口、弧形文字、细线轨迹和留白共同构成第一眼记忆点。


  不要脏灰旧化，不要暗淡色调，不要衬线字体，不要水印，不要真实Logo，不要卡通风，不要复杂背景。'
