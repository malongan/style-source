prompt: |
  Create an elegant, premium travel poster featuring a magical miniature world of {目的地/城市} emerging from the luminous smoke of an ornate antique brass magic lamp placed at the bottom right. The smoke gradually transforms into a floating island-like diorama carved from paper, stone, and marble, seamlessly blending fantasy with authentic cultural architecture.

  The foreground should resemble an exquisite fusion of paper sculpture, carved limestone, folded origami geometry, miniature architectural models, and finely chiseled marble, with intricate textures, layered depth, tiny windows, winding staircases, terraces, courtyards, vegetation, boats, bridges, and architectural ornaments.

  The background should dissolve into a traditional East Asian ink wash (sumi-e) landscape painted with delicate watercolor gradients, expressive ink brushstrokes, soft atmospheric perspective, mist-covered mountains, distant coastlines, rivers, islands, clouds, and subtle washes of monochromatic sepia and charcoal.

  The overall color palette should be dominated by warm ivory, parchment white, sandstone, cream, limestone, beige, soft sepia, muted ochre, and light charcoal. Include a tiny lone traveler standing near the lamp, looking upward toward the floating world.

  Use a refined, vintage travel poster composition with generous negative space on warm textured parchment paper. The floating diorama should occupy the upper two-thirds of the canvas.

  Style Keywords: masterpiece, ultra-detailed, paper sculpture, carved marble, layered miniature architecture, origami textures, sumi-e ink wash, watercolor illustration, atmospheric perspective, parchment paper texture, magical realism, cinematic lighting, museum-quality illustration, luxury travel poster, whimsical world-building, highly intricate, elegant composition, 8K, editorial design, premium print quality.

  不要水印，不要真实Logo，不要电商广告感。

