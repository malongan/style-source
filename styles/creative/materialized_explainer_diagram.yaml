# 材质化解释图风格

id: materialized_explainer_diagram
name: "材质化解释图风格"
category: creative

tags:
  - 材质化
  - 解释图
  - 3D材质
  - 白底干净
  - 知识可视化

triggers:
  - 材质化解释图
  - 3D材质知识图
  - 白色解释图
  - 白底知识可视化
  - materialized explainer

features:
  - "**白底工作室光线** — 物体摆放在白色桌面上，像真实实体模型摄影，整体干净克制高级感"
  - "**轻量3D材质质感** — 磨砂塑料、半透明亚克力、金属、玻璃、纸质感卡片等，可触摸的真实质感"
  - "**单一鲜明点缀色** — 只用一个主题色（IKB蓝/橙色/薄荷绿/马卡龙粉/亮黄色），其余保持白、浅灰、黑"
  - "**短中文标签嵌入** — 2-5个汉字标签放在白色空间或细线指示区，标签越短画面越高级"
  - "**清晰结构关系** — 模块间有逻辑连接，远看像杂质内页，近看每个模块都能读清楚"

scene: "知识库、百科解释、产品说明、流程可视化、数据图表、科普示意"
ratio: "3:4"
summary: "材质化解释图，白色底+3D材质实体+单一点缀色+短中文标签，把抽象概念变可触视觉模型"

prompt: |
  生成一张"材质化解释图"。主题：【填写主题】 核心元素：【填写要解释的概念/结构/流程】
  图像风格：白底工作室光线，物体摆放在白色桌面上，像真实实体模型摄影。整体干净、克制、有高级感。
  核心元素采用轻量3D材质质感（磨砂塑料、半透明亚克力、金属、玻璃、纸质感卡片等）。
  画面中只使用一个鲜明点缀色（IKB蓝、橙色、薄荷绿、马卡龙粉、亮黄色等）。其余部分保持白色、浅灰、黑色和低饱和中性色。
  请在图中嵌入简短中文标签（2~5个汉字），放在白色空间、标签板或细线指示区。
  整体要像杂质级知识解释图，高端PPT中心配图，产品说明模型，教育科普示意图，工作汇报里的概念可视化图。
  要求：信息清楚、结构简洁、模块关系明确。 禁止复杂背景、多色堆砌、廉价科技感、过度装饰、标签变形。
  不要水印，不要真实Logo，不要电商广告感。

