  style_var: large lower-third editorial headline
  desc: ''
prompt: 'Create a {ASPECT_RATIO} premium analog fashion editorial poster photograph. Subject: {SUBJECT}. Action and pose: {SUBJECT_ACTION}. Wardrobe and styling: {WARDROBE_STYLE}. Product or prop: {PRODUCT_OR_PROP},
  with a small physical nameplate, plaque, tag, or engraved label integrated into the object. Location: {LOCATION}. Background and foreground details: {BACKGROUND_ELEMENTS}. Preserve these style fidelity
  anchors: {STYLE_FIDELITY_ANCHORS}. Avoid this source content: {SOURCE_CONTENT_TO_AVOID}. Use warm direct sunlight, shallow depth of field, foreground botanical or textile blur, slight film grain, soft
  analog shadows, tactile fabric and metal textures, relaxed luxury mood, and a close low editorial camera angle. Add clean white lower-third typography: large uppercase headline text reading "{MAIN_TEXT}"
  followed by the accent "{ACCENT_SYMBOL}", with a smaller white caption block reading "{SECONDARY_TEXT}". The typography should feel printed on a fashion magazine prompt-card poster, not like a watermark
  or app UI. Do not use real logos or real brand marks.'
