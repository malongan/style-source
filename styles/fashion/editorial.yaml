- Sunlit Supermodel Nameplate Editorial
features:
- title: Low-angle or seated outdoor fashion editorial composition with the model filling the middle third.
  desc: ''
- title: Warm direct sunlight, soft analog shadow rolloff, natural skin highlights, and slight film contrast.
  desc: ''
- title: Dense botanical or environmental foreground blur crossing the lower frame.
  desc: ''
- title: Shallow depth of field with garden, greenhouse, terrace, or coastal texture melting into bokeh.
  desc: ''
- title: Calm supermodel posture with elongated neck, relaxed hands, and composed expression.
  desc: ''
