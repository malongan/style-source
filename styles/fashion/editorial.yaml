- kv_var: '`SUBJECT`'
  style_var: main supermodel or editorial fashion subject
  desc: ''
- kv_var: '`SUBJECT_ACTION`'
  style_var: poised seated, reclining, leaning, or kneeling action
  desc: ''
- kv_var: '`PRODUCT_OR_PROP`'
  style_var: luxury prop, case, chair, trunk, compact, garment detail, or object carrying a small material nameplate
  desc: ''
- kv_var: '`LOCATION`'
  style_var: outdoor or greenhouse editorial environment
  desc: ''
- kv_var: '`BACKGROUND_ELEMENTS`'
  style_var: botanical or environmental details that create soft foreground and background depth
  desc: ''
