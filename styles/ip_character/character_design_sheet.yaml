  - "**一致性锁定核心** — 所有模块必须是同一个角色，脸型、发型、服装、比例完全一致，主展示区域最大最清晰作为统一参照"
  - "**极简专业背景** — 纯白或极简浅色背景，干净专业的技术型设定板版式，标签清晰"
  - "**完整配色系统** — 6-8个主色块色板，统一角色色彩体系"
  - "**全角度覆盖** — 正面+四分之三侧面+侧面+背面，头部四分之三/侧面/仰视/俯视，轮廓剪影正侧面对照"

scene: "动画/漫剧角色设计、游戏立绘设定、品牌IP/吉祥物标准档案、团队协作时的角色圣经"
ratio: "3:4"
summary: "一套锁定角色统一形象的完整设定板提示词模板，包含从信息区到手部动作的11个标准化模块，确保角色在后续所有生成中保持一致。"

prompt: |
  生成一张高精度"角色设定板"，用于锁定同一角色的统一形象。
  基于上传的参考图或以下描述，生成完整角色设定板。所有模块必须是同一个角色，禁止脸型、发型、服装、比例发生任何漂移。

  【基础设定】
  风格：【写实3D / 动漫 / 半写实 / IP设计】
  角色描述：【填写详细描述，或说明已上传参考图】
  性别 / 年龄 / 体型：【填写】
  风格关键词：【高级感 / 科技感 / 情绪化 / 未来感 等】
  背景：纯白或极简浅色
  版式：干净、专业、技术型设定板
  要求：无水印、无Logo、标签清晰

  【必须包含模块】
  1. 顶部信息区（名字、身份、年龄、性格关键词3-5个、核心主题描述）
  2. 配色系统（6-8个主色块）
  3. 主身份展示（最大区域）：正面 + 四分之三侧面 + 侧面 + 背面 + 标准站姿 + 身高比例线
  4. 轮廓剪影（正面 + 侧面）
  5. 表情系统（8张）：平静、好奇、紧张、惊讶、害怕、悲伤、坚定、放松
  6. 微表情（5张）
  7. 头部结构（四分之三、侧面、仰视、俯视）
  8. 姿态变化（放松、紧张、自信）
  9. 情绪特写（胸部以上强情绪近景）
  10. 服装细节（发型、材质、配饰、鞋子）
  11. 手部动作（放松、紧张、指向、抓握、接触面部）

  【一致性要求】
  所有模块必须是同一个角色，脸型、发型、身体比例、服装完全一致。
  主展示区域必须最大、最清晰，作为统一参照。
  请输出完整、专业、结构清晰的角色设定板。
  不要水印，不要Logo，不要电商广告感。

