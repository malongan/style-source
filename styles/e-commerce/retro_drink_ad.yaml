name: 复古饮料广告
category: e-commerce
ratio: 3:4 竖版
source_author: '@xiaoxiaodong01'
source_url: 'https://x.com/xiaoxiaodong01'
summary: 超大圆角字标压住上方视觉重心 + 底部真实商品摄影 + 放射块状背景 = 清甜复古广告感。
tags:
- 饮料
- 复古
- 广告
- 商业
- 海报
- 食品
triggers:
- 饮料广告
- 复古广告
- 食品海报
- 商业广告视觉
features:
- title: 超大厚实圆角主题字标
  desc: ''
- title: 真实商品摄影质感（高光、冷凝水、自然阴影）
  desc: ''
- title: 放射块状背景，边界锐利
  desc: ''
- title: 三层文字系统：主字标→副标题→边角小字
  desc: ''
- title: 高明度、高饱和、干净通风
  desc: ''
variables:
- kv_var: 主标题
  style_var: 主字标
  desc: 超大圆角字标
- kv_var: Slogan
  style_var: 副标题/手写斜体短句
  desc: 辅助文案
- kv_var: 画面-主题
  style_var: 饮料主题
  desc: 饮品主题
- kv_var: 色彩-结构色
  style_var: '{{结构色}}'
  desc: 大面积背景色
- kv_var: 色彩-强调色
  style_var: '{{强调色}}'
  desc: 放射块状和装饰
- kv_var: IP形象
  style_var: 参考图 + "Maintain IP identity..."
  desc: 不在变量里，用参考图
prompt: 围绕{{饮料主题}}生成一张明亮轻快的复古商业广告视觉：画面第一眼由超大、厚实、圆角饱满的{{主字标}}建立记忆点，字形像柔软膨胀的招牌块面，浅色填充、边缘干净，压住上方视觉重心；{{饮品主形体}}以真实商品摄影质感出现在下部中心，近距离放大，带清晰高光、冷凝水或液体光泽、自然阴影，向前覆盖背景与部分文字，让平面图形和真实产品形成强烈前后层次。背景使用从主体附近向外扩散的放射块面，边界锐利、节奏密集，形成速度感和欢快冲击力。文字系统分三层：主字标最大，{{副标题}}用窄高的复古大写字体紧贴其下，{{小字号信息}}分散在边角，{{手写斜体短句}}以弧线或斜线穿过主体周围，并加入少量白色线描弧、闪光符号和细小标记增强节奏。色彩从饮料的风味、材质、品牌情绪中提取，保留大面积清亮{{结构色}}、少量{{强调色}}、浅色信息文字和温暖主体色的角色关系；整体高明度、高饱和但干净通风，色阶清晰，情绪新鲜、俏皮、充满能量，避免灰暗脏旧、浑浊蒙层和低活力复古颗粒。
