name: 近景饮料产品海报
category: e-commerce
ratio: 3:4
source_author: '@xiaoxiaodong01'
source_url: 'https://x.com/xiaoxiaodong01/status/2077361536683913337'
summary: '"大字被实物压住"的图文张力 + 强广告感近景海报。中心主题向前压近，顶部蓬松堆叠、泡沫颗粒质感，遮挡上方超大白色标题；背景用主题派生暖色平面，高亮度干净广告棚拍光。'
tags:
- 饮料
- 产品海报
- 强广告感
- 近景海报
- 商业
triggers:
- 饮料海报
- 产品广告
- 商业海报视觉
- 近景广告
features:
- title: 大字被实物压住
  desc: 超大白色无衬线标题被中心主题遮挡，形成图文张力
- title: 蓬松堆叠质感
  desc: 顶部保留蓬松、泡沫、颗粒、碎屑、纹理等可食用质感
- title: 暖色平面背景
  desc: 主题派生的单一暖色或高情绪色平面，最大面积
- title: 商业棚拍光
  desc: 光线来自上前方，主体高光清晰，一侧投出大块椭圆硬阴影
- title: 材质层级分明
  desc: 透明、半透明、乳浊、颗粒或柔软部分彼此分层
variables:
- style_var: '{{主题}}'
  desc: 饮料名称，如香草拿铁
- style_var: '{{用途}}'
  desc: 用途说明，如产品海报
prompt: |
  围绕任意主题对象生成一套强广告感的近景海报画面：中心主题以真实可触的载体出现，占据视觉中轴并向前压近，顶部或表面保留蓬松、堆叠、颗粒、碎屑、泡沫、纹理或主题派生的附着物，让实物边缘遮住后方超大标题的一部分。标题使用厚重、紧压、全大写感的白色无衬线展示字，字距收紧、行距很短，先形成一整块坚硬的白色墙面，再被中心主题切开和覆盖；下方再用同样粗壮的短词组建立第二重落点，顶部和底部辅以小字号信息、奖章式小徽标、评分星号和引号短评，所有文字都像电影海报或季节限定广告的排片信息一样围绕中心物组织。背景采用主题派生的单一暖色或高情绪色平面，占最大面积，颜色不照搬固定色相，而按主题抽取一个饱和、干净、偏温热的主场色，搭配白色信息字、主题物的中明度主体色、少量深色阴影和颗粒点缀；整体保持明亮、洁净、直接，不加入灰雾或脏旧质感。光线来自上前方，主体表面高光清晰，右侧或一侧投出大块椭圆硬阴影，使平面背景有舞台感。材质层级要清楚：透明、半透明、乳浊、颗粒或柔软部分彼此分层，边缘略有真实摄影的压缩和反光，小字保持可读但不过度精修。画面重点是"大字被实物压住"的图文张力，若标题退到装饰、主体没有遮挡文字、背景变成复杂场景，都会削弱这种直接、热烈、可售卖的广告味。
  主题：{{主题}}
  用途：{{用途}}
