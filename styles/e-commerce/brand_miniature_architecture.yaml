prompt: 'Please generate a vertical 2:3 ultra-realistic miniature architecture photography poster.


  【Information】

  Brand Name: [品牌名称，如 Starbucks]

  Architectural Scene: [建筑功能，如 corner cafe]

  Main Poster Title: [主标题]

  Subtitle: [英文副标题]


  [Visual Requirements]

  The main subject of the image is a large "[产品包装]"，designed as a fully functional "[建筑场景]"，seamlessly integrated with the real urban environment. Maintain precise proportions of miniature model with ultra-realistic
  photographic quality.


  [Main Design]

  包装必须保留品牌识别特征：主色调、包装轮廓、Logo位置、材质细节、真实结构。包装逻辑转换为建筑空间：入口、玻璃橱窗、室内功能区、露台、地板、屋顶结构。


  [Environmental Integration]

  融入真实城市环境，包含街道拐角、人行道、斑马线、路灯、交通流、路边绿化等丰富细节。


  [Characters and Narrative]

  融入真实比例微缩人物，自然动作，包含顾客排队、店员工作、骑手取餐等场景。细节真实，避免玩偶感。


  [Poster Composition]

  2:3竖版构图，主建筑置于画面中下，顶部留白，四分之三视角+轻微高角度，背景浅景深柔焦。


  [Lighting, Shadow, and Materials]

  根据品牌色调设定光影，整体风格成熟精致写实。


  [White Poster Text]

  左上区域添加现代简洁白色文字，无衬线字体，排版考究。


  [Style Keywords]

  Hyper-realistic miniature architectural photography, authentic brand space, 2:3 commercial poster, building-as-giant-product-packaging, integration with real urban environments, macro photography, architectural
  model photography.'
