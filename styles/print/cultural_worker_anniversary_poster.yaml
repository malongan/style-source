prompt: |
  围绕任意主题对象或具体内容生成，画面以极具视觉冲击力的现代东方美学为核心，呈现一种极简而充满仪式感的空间张力。构图与主体位置：摒弃传统的居中填满式构图，采用大面积的纯色留白（负空间）来制造视觉呼吸感和空间悬念。主题对象不作为填满画面的元素，而是被处理为精炼的视觉焦点，可能被边缘切割、局部放大或以极具雕塑感的形式置于画面的偏心位置。背景绝对干净，没有多余的场景铺陈，通过极致的留白反衬主体的形态张力。主体边缘清晰锐利，与背景形成绝对的剥离感。色彩系统与情绪：色彩呈现出"高纯度与极致克制"的矛盾统一，情绪上具有强烈的"现代仪式感、庄重与极简张力"。底色被一种强烈的、高纯度且无杂质的主题色大面积覆盖，底色必须平整、均匀或带有极微弱的高级肌理，保持干净，拒绝浑浊。主体色从其自身材质提取，与底色形成极高对比。保留极少量的金属质感色彩或极高明度亮色作为点缀。色彩系统必须保持清透、鲜锐和现代感，不发灰、不老旧。图形机制与材质肌理：主题对象无论原本是何种物质，均需表现出一种被精心提炼过的"现成品艺术"或"高级设计品"质感。表面光影处理干净、硬朗或带有细腻的哑光质感。画面中可融入极为纤细、精确的几何线条或抽象的切分结构，作为承载视觉重心的骨架。排版与信息层叠：文字被视为重要的图形构成要素。排版呈现典型的现代主义海报风格：信息沿着画面边缘或依托隐藏的网格线进行精确对齐，字间距克制。文字作为精密的结构线，与大面积留白形成极强的疏密对比。
  不要水印，不要真实Logo，不要电商广告感。

