prompt: |
  围绕具体主题内容生成一张具备高度秩序感的现代平面视觉设计。画面完全摒弃真实物理空间的纵深，采用绝对平整、纯粹的大面积平铺色彩作为背景基底。色彩从主题的情绪与文化属性中提取，保留大面积明亮高饱和底色、高对比度信息色以及少量精致强调色的系统关系，使整体画面保持清透、干净且极具视觉冲击力，拒绝任何灰暗、浑浊的渐变或杂质。视觉重心由严谨的版式工程主导。画面中放置放大且极具图形感的主题字体或核心信息符号，呈现出清晰锐利的边缘。四周的次级说明文字、数字标签与微缩点缀图形，被极细的几何线框（如圆角矩形、直线分割）精准收纳与隔离。文字与线框形成秩序井然的网格信息系统。少量强调色仅用于极细的边框、微型图标或印章式点缀，与主对比色的文字形成细腻的质感层次。整体气质明亮、精确且具有现代仪式感。大面积纯色留白与密集的线框文字块产生强烈的图文疏密张力。确保最终呈现出如同矢量图形般锐利、工整且高级的现代排版质感。
  不要水印，不要真实Logo，不要电商广告感。

