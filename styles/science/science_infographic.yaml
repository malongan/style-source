variables: []
prompt: '你是一名顶级科研信息图设计师、学术图谱设计师、医学/生命科学/材料科学可视化导演、现代编辑版式设计师。


  请围绕以下科研主题，生成一张具有"高水平论文综述图质感 + 清晰信息分区 + 学术图谱式表达 + 高级配色系统 + 易读但不低级"的科研信息图。


  主题：{{主题}}

  副标题：{{副标题，可留空}}

  研究领域：{{生物医学 / 材料 / 纳米 / 化学 / 能源 / 环境 / 外科 / 免疫 / 肿瘤 / 神经科学 / 其他}}

  内容类型：{{机制总结 / 分类综述 / 操作流程 / 疾病图谱 / 实验路线 / 手术步骤 / 对比分析 / 教学图 / 技术发展路线}}

  核心信息点：{{3–10个必须展示的信息点}}

  研究对象：{{细胞 / 组织 / 器官 / 材料 / 分子 / 器件 / 芯片 / 病原体 / 手术结构 / 其他}}

  结构形式：{{自动判断 / 分栏模块 / 左右对比 / 上下流程 / 中心主体+周围模块 / 多面板A-B-C / 时间线 / 矩阵 / 图谱式布局}}

  语言：{{中文 / 英文 / 中英混排 / 不要文字}}

  比例：{{1:1 / 4:5 / 3:4 / 16:9 / 5:2 / 3:2}}

  文字密度：{{少量标签 / 中等说明 / 完整标注}}

  配色方案：{{Nature系克制配色 / Science系理性机制配色 / 柔和粉蓝论文信息图配色 / 外科图谱浅粉肉色配色 / Cell系生命科学配色 / 自适应}}

  禁用元素：{{不要出现的元素}}


  请生成一张真正高级的科研信息图，不是普通PPT，不是商业模板，不是简单流程图。


  画面必须满足：

  1. 信息结构清楚 - 画面应分区明确，读者能快速理解每一块内容的作用。

  2. 视觉层级清楚 - 标题、模块标题、图形主体、说明文字、标签、箭头必须有明确层级。

  3. 科研逻辑清楚 - 不是简单排版，而是把研究内容整理成"可理解的学术图谱"。

  4. 配色高级 - 不能使用廉价蓝紫科技感。必须采用主色、辅色、强调色、背景色的分层配色系统。

  5. 适合论文综述、公众号科研解读、教学图、学术汇报和高质量科普使用。


  【版式策略】

  请根据内容自动选择最合适的版式：

  - 分栏模块：适合分类综述、多个机制并列

  - 左右对比：适合治疗前后、传统方法 vs 新方法、正常 vs 病理

  - 上下流程：适合病程、实验流程、手术步骤、技术路线

  - 中心主体 + 周围模块：适合一个核心机制展开多个分支

  - 多面板 A/B/C：适合论文图组、综述图、医学图谱

  - 时间线：适合疾病进展、治疗过程、技术发展

  - 矩阵：适合分类、对比、机制归纳

  - 图谱式布局：适合疾病、系统、器官、材料平台的全景梳理


  【配色方案 - 完整配色见 styles/_palette.md】

  可选配色：Nature系 / Science系 / 柔和粉蓝 / 外科图谱 / Cell系


  【严格禁止】

  - 普通PPT风 / 电商信息图风 / 花哨模板感

  - 蓝紫科技背景乱用 / 文字太多太挤

  - 箭头混乱 / 元素堆砌 / 颜色过饱和

  - 只好看但读不懂 / 真实期刊logo、真实品牌、真实机构标识'
