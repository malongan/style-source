prompt: '你是一名顶级科研封面视觉总监、学术期刊封面设计师、科学概念艺术导演、现代编辑设计师。


  请围绕以下科研主题，生成一张具有"顶级科研期刊封面气质 + 原创主视觉概念 + 高级配色系统 + 强视觉冲击 + 科学机制暗示 + 非模板化版式"的科研杂志封面图。


  封面主题 / 主标题：{{主题}}

  副标题：{{副标题，可留空}}

  研究领域：{{生物医学 / 材料 / 纳米 / 化学 / 能源 / 环境 / 神经科学 / 免疫 / 肿瘤 / 外科 / 芯片 / 器件 / 其他}}

  研究对象：{{细胞 / 组织 / 器官 / 分子 / 材料 / 晶格 / 纳米颗粒 / 芯片 / 器件 / 病原体 / 生态系统 / 其他}}

  核心机制 / 视觉概念：{{一句话写清楚研究亮点或封面概念}}

  关键视觉元素：{{3–6个必须出现的元素}}

  封面类型：{{虚构期刊封面 / 无刊名纯主视觉 / 科研海报封面 / PPT封面 / 公众号封面}}

  语言：{{中文 / 英文 / 中英混排 / 不要文字}}

  比例：{{1:1 / 4:5 / 3:4 / 16:9 / 5:2 / 3:2}}

  文字需求：{{极少文字 / 只要标题 / 标题+副标题 / 不要文字}}

  配色方案：{{Nature系克制高级 / Science系理性高级 / Cell系生命科学高对比 / Advanced Science高饱和封面色 / 黑白灰+单一强调色 / 浅色高级医学封面 / 自适应}}

  版式偏好：{{自动判断 / 大主视觉 / 极简封面 / 暗色氛围 / 浅色高级 / 中心主体 / 斜向构图 / 微观世界 / 宏观隐喻 / 结构剖面}}

  禁用元素：{{不要出现的元素}}


  请生成一张真正像顶级科研杂志封面的原创视觉作品。


  它必须做到：

  1. 主视觉强 - 画面要有一个清楚、震撼、可记忆的核心视觉。

  2. 不模板化 - 不要固定成"顶部大刊名 + 中间瓶子/物体 + 底部流程"的套路。不要默认模仿 Nature、Science、Cell、Advanced Science 的真实版式。

  3. 科学概念清楚 - 封面不是机制图，但必须能暗示研究对象、科学机制或学术主题。

  4. 配色有冲击 - 封面色彩可以比论文插图更大胆，但必须高级、克制、有层次。

  5. 文字少而精 - 封面图不应塞满标签和说明。文字应像编辑设计系统的一部分。


  【封面版式策略】

  1. 单一强主体型 - 一个核心科研对象作为视觉中心，适合疫苗、材料、器官、器件、芯片、纳米结构

  2. 微观宇宙型 - 把细胞、分子、晶格、病毒、材料微结构表现成宏大的空间场景

  3. 概念隐喻型 - 用桥、光束、屏障、护盾、网络、裂缝、通道等隐喻表达科学机制

  4. 结构剖面型 - 用透明剖面、层级切面、组织截面、材料截面表达研究对象内部机制

  5. 动态作用型 - 表现粒子迁移、信号传导、免疫攻击、能量转换、材料响应等动态过程

  6. 极简高级型 - 大留白、单主体、少量高亮色，适合 Nature系、Science系克制封面

  7. 高冲击封面型 - 强光影、高对比、深色背景、鲜明强调色，适合 Advanced Science / Advanced Materials 风格


  【配色方案 - 完整配色见 styles/_palette.md】

  可选配色：Nature系克制高级、Science系理性高级、Cell系生命科学高对比、Advanced Science高饱和封面色、黑白灰+单一强调色、浅色高级医学封面、自适应


  如果需要刊物感，可使用虚构刊名，例如：

  "SCIENCE VISUAL REVIEW" / "ADVANCED LIFE SYSTEMS" / "MOLECULAR FRONTIERS" / "BIOMEDICAL HORIZONS" / "MATERIALS INSIGHT"

  但不能使用真实期刊 logo、真实刊名字样或官方版式。刊名不是必须出现。


  【严格禁止】

  - 固定顶部刊名模板 / 直接模仿真实期刊封面 / 使用真实期刊logo

  - 普通蓝紫科技海报 / 电商广告感 / 医美广告感

  - PPT封面模板感 / 机制说明文字太多 / 底部强行放流程图

  - 画面过满 / 科研对象不清楚 / 色彩单薄、廉价、无层级'
