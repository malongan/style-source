name: Luxury Beauty Campaign Side Profile Poster
category: brand_kv
ratio: 9:16（竖版）
source_author: '@MrLarus'
source_url: ''
summary: 高端美妆 campaign 的核心公式：近景侧面女性肖像 + 超大半透明衬线字体 + 红色手写体点缀 + 温暖逆光 = 干净、光泽、电影感的商业级大片。
tags:
- 美妆
- 高端
- 护肤
- 香水
- 珠宝
- 侧面肖像
- campaign
- 杂志风
triggers:
- Luxury Beauty Campaign
- 高端美妆海报
- 侧面肖像
- 衬线字体
- 红色手写体
features:
- title: Close-up side-profile female portrait
  desc: 近景侧面女性肖像作为画面主体
- title: Realistic skin texture
  desc: 真实皮肤纹理，自然裸妆
- title: Warm reverse light
  desc: 温暖逆光，营造光泽感
- title: Oversized translucent serif typography
  desc: 超大半透明衬线字体
- title: One red handwritten script accent
  desc: 一处红色手写体强调
- title: Minimal blurred background
  desc: 极简模糊背景
- title: Small brand logo + slogan + copy
  desc: 品牌 logo + 标语 + 正文 + 页脚细节
variables:
- kv_var: 主标题
  style_var: '{{Main title}}'
  desc: PROFILE/GLOW/VEIL/ECLAT
- kv_var: 红色强调词
  style_var: '{{Red script word}}'
  desc: refine/luminous/softly/timeless
- kv_var: 品牌名称
  style_var: '{{BRAND NAME}}'
  desc: 品牌名
- kv_var: Slogan
  style_var: '{{Slogan}}'
  desc: 短标语
- kv_var: 人物角度
  style_var: '{{Portrait angle}}'
  desc: left/right side profile 等
- kv_var: 色彩-主色
  style_var: '{{Color palette}}'
  desc: cream beige/champagne gold 等
- kv_var: 画面-焦点
  style_var: '{{Key focus}}'
  desc: jawline/skin glow 等
- kv_var: IP形象
  style_var: 参考图 + "Maintain IP identity..."
  desc: 不在变量里，用参考图
prompt: 'Prompt:


  Create a single vertical 9:16 luxury beauty campaign poster.


  Brand: [BRAND NAME]

  Subtitle: [BRAND SUBTITLE]

  Main title: [PROFILE / GLOW / VEIL / ECLAT]

  Red script word: [refine / luminous / softly / timeless]

  Slogan: [SHORT SLOGAN]

  Main copy: [MAIN COPY]

  Portrait angle: [left side profile / right side profile / semi-profile / lowered side profile]

  Color palette: [cream beige / pearl white / champagne gold / misty rose / soft silver]

  Key focus: [jawline / skin glow / neck / fragrance / pearl earring / collarbone]


  Use a close-up side-profile female portrait with realistic skin texture, natural makeup, soft lips, elegant neck and collarbone, natural hair strands, and warm reverse light. Create a premium editorial
  beauty-ad look with a minimal blurred background, oversized translucent serif typography, one red handwritten script accent, small brand logo, slogan, main copy and footer details.


  The image should feel like a high-end beauty, skincare, fragrance or jewelry campaign poster: clean, luminous, refined, cinematic and commercial-grade.


  Avoid Chinese text, cheap promo style, plastic skin, distorted hands, repeated faces, messy text, cluttered background and overdone AI beauty retouching.'
