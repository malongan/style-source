name: Bold Monoline 品牌吉祥物插画
category: brand_kv
ratio: 4:5 / 3:4 / 1:1 / 9:16
source_author: '@poletaeviktor'
source_url: 'https://x.com/poletaeviktor'
summary: 以粗黑轮廓线 + 双色填充的丝网印刷风格，呈现品牌吉祥物的街潮插画，像印刷在帆布袋或T恤上的图案。
tags:
- 品牌吉祥物
- 粗轮廓线
- 双色插画
- 丝网印刷
- Streetwear
- 品牌KV
triggers:
- 粗线吉祥物
- 双色插画
- 品牌角色
- 街潮吉祥物
- 丝网印刷风
- Monoline Mascot
features:
- title: 粗轮廓线 + 双色极简
  desc: 深炭黑 (#2B2B2B) 线条+填充 + 浅暖米白 (#F2F2F0) 纸张底色，仅用两色构建视觉，无渐变无阴影
- title: 丝网印刷质感
  desc: 深色填充区带细腻丝网印刷/孔版印刷颗粒感，浅色区有纸张纹理，还原传统 risograph 效果
- title: 品牌吉祥物为中心
  desc: 主体为品牌标志性角色/吉祥物，粗线条勾勒轮廓，深色填充 + 白色负空间细节，简洁有力
- title: 正负形二色调
  desc: 利用正负空间关系，深色填充部分镂空留白，形成强烈的图形识别度
- title: 品牌文字小标签
  desc: 品牌名以小型标签形式融入画面，不喧宾夺主，保持图形感
variables:
- kv_var: '{品牌名}'
  style_var: '{品牌名}'
  desc: 品牌名称，如「STREETLAB」「GOAT」「VISION」
- kv_var: '{吉祥物描述}'
  style_var: '{吉祥物描述}'
  desc: 品牌吉祥物的特征描述，如「一只戴着墨镜的山羊」「一个酷酷的滑板少年」
- kv_var: '{英文标语}'
  style_var: (可选)
  desc: 如需加入英文标语，替换品牌名标签
prompt: '[BRAND NAME]. Act as a Senior Brand Illustrator, specializing in bold monoline streetwear character illustrations of brand mascots (style: bold-weight flat graphic, screen-print/risograph aesthetic,
  positive-negative two-tone illustration).


  PHASE 1: BACKGROUND — 浅暖米色纸张背景 (#F2F2F0)，带细腻纸张纹理


  PHASE 2: SUBJECT — BRAND MASCOT — Bold monoline 风格，{吉祥物描述}，粗轮廓线 + 深色填充 + 白色负空间细节


  PHASE 3: TWO-COLOR ONLY — 深炭黑 (#2B2B2B) + 米白背景，无渐变，无中间色


  PHASE 4: SCREEN-PRINT TEXTURE — 深色填充区有细腻丝网印刷质感


  PHASE 5: TEXT — 品牌名「{品牌名}」以小标签形式融入画面右下或左下角


  TECH SPECS: 8K分辨率，纯2D，无3D/光影/渐变'
