features:
  - "**正面低仰角英雄视角** — 赛车正面居中低角度拍摄，车头迎面而来，充满速度感与压迫感"
  - "**极简纵深场景** — 背景以极简主义手法营造空间深度，地平线、远山剪影等简约场景元素"
  - "**叠加几何图形设计** — 大型太阳形状、重叠几何色块、斜向面板、柔和条纹、半透明形状等层次叠加"
  - "**品牌标识系统** — 顶部大字标题 [TITLE]、品牌小 Logo、底部短标语 [SLOGAN]，构成完整赛车涂装感"
  - "**做旧复古质感** — 复古印刷褪色、做旧纸张纹理、细微划痕、日晒褪色色调，散发 vintage 怀旧气息"
  - "**4:5 竖版对称构图** — 经典海报比例，完美对称布局，赛车编辑风质感，精致的赛车运动美学"

scene: "汽车品牌KV、赛车运动宣传、老爷车文化、品牌联名、复古汽车海报"
ratio: "4:5"
summary: "复古赛车运动海报风格，正面低仰角赛车视角 + 叠加几何图形背景 + 做旧复古质感，完整品牌标识系统"

prompt: |
  {赛车车型}，复古赛车涂装

  正面低仰角英雄视角，赛车居中于画面，冲击感强烈
  极简场景纵深：[SCENERY]，简约地平线与远景
  叠加几何图形背景：大型太阳形状、重叠色块、斜向面板、半透明条纹
  顶部大字标题："[赛事/品牌标题]"，底部短标语："[SLOGAN]"
  品牌 Logo 置于顶部或底部角落

  色调：[PALETTE]，暖色做旧、日晒褪色、复古印刷质感
  做旧纸张纹理、细微划痕磨损、老化褪色效果
  干净负空间，清晰汽车细节，4:5 竖版比例
  海报对称构图，精致赛车编辑风

  不要水印，不要杂乱背景，不要现代元素，不要扁平无纹理。
  比例：4:5

variables:
  - '"{赛车车型}" — 示例：1960年代保时捷911赛车 / 经典法拉利250 GTO复古涂装 / 福特Mustang复古大奖赛赛车'
  - '"{SCENERY}" — 示例：沙漠公路尽头的远山、日落海岸线、复古加油站、旧赛道看台'
  - '"{PALETTE}" — 示例：红白蓝经典配色、橙黄日落渐变、橄榄绿复古军色、焦糖棕暖调'
  - '"{赛事/品牌标题}" — 示例：MONTE CARLO RALLY / LE MANS CLASSIC / PORSCHE CUP'
  - '"{SLOGAN}" — 示例：Racing Heritage / Born to Race / Legacy in Motion'

