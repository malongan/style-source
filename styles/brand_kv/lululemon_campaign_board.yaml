prompt: |
  Create a high-end Lululemon Athletica campaign board with one large hero banner and six smaller supporting panels on a minimalist pure-color background.

  Layout: Large horizontal hero banner dominates the upper section, six smaller panels arranged in a clean grid below. The composition feels organized, rhythmic, and premium like a complete seasonal campaign presentation.

  Color system: cool pink-lilac, powder lavender, ivory white, deep charcoal black, with small controlled accents of soft berry or silver-gray. Clean, elevated, and contemporary.

  Hero banner: A healthy Western female athletic model as the main campaign face with realistic anatomy, strong fit physique, modern facial structure, and poised editorial presence. Authentic Lululemon Athletica apparel rendered with premium realism. Large modern English typography interacts with the figure in a bold but elegant way.

  Six supporting panels: Each tile shows a different supporting story through movement, product emphasis, or graphic narrative — stretching poses, crouching action, standing balance, footwear detail, motion-focused dynamic panel, and product-centric slogan panel. Each follows the same Lululemon visual family.

  Typography: Large modern English words and phrases with refined hierarchy and editorial placement. Text directions: "LULULEMON", "ATHLETICA", "FORM LEADS FORCE", "MOTION HOLDS SHAPE", "MOVE WITH CLARITY", "STRUCTURE IN FLOW". Clean, contemporary, bold, and premium.

  Hand-drawn narrative graphics: Refined hand-drawn text elements, brush underlines, motion curves, symbolic marks, calligraphic linework, and graphic loops integrated into the layout.

  Background: Minimal pure-color or soft gradient-flat background, highly structured and contemporary. No realistic scenery or busy environment.

  Lighting: Bright premium editorial lighting across the entire board. Each figure and product feels hyper-real, crisp, and premium against clean color fields.

  Mood: structured, premium, athletic, fashion-forward, contemporary, graphic, editorial, youthful, disciplined, high-impact, polished, intelligently designed.

  Rendering style: hyper-real Lululemon Athletica campaign board, one large hero banner plus six smaller panels, minimalist pure-color background system, expressive narrative typography, hand-drawn storytelling graphics, cool pink-lilac and ivory palette, premium sportswear realism, avant-garde fashion-sport editorial, 8k, world-class campaign quality.

