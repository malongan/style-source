- title: 亮红色（rgb(255,140,0)）主色调，高对比视觉冲击
  desc: ''
- title: 黑白色调女孩人物（做旧卫衣、机械感帽子项链）
  desc: ''
- title: 多语言文字信息层叠（LSHENG、LAOS 等巨型字母）
  desc: ''
