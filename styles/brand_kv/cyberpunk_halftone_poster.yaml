  desc: ''
variables:
- kv_var: 主标题
  style_var: '{{文字A}}、{{文字B}}'
  desc: 巨型艺术化字母
- kv_var: Slogan
  style_var: 段落式字符
  desc: 侧边多语言信息
- kv_var: 画面-主体
  style_var: '{{人物形象}}'
  desc: 黑白色调人物
- kv_var: 色彩-主色
  style_var: '{{主色}}'
  desc: 亮红色高饱和
- kv_var: IP形象
  style_var: 参考图 + "Maintain IP identity..."
  desc: 用参考图保持一致性
prompt: '大师级排版，极繁主义，半调图案，杂色，丝网印刷质感。重叠边缘色彩渐变，同位色渐变色系，点线面层次分布。


  构建赛博朋克风海报场景：背景以{{主色}}为主色调；主体是{{色调}}色调的{{人物形象}}（穿着{{服装描述}}，佩戴{{配饰描述}}）；画面布满多语言文字信息（如顶部"{{文字A}}""{{文字B}}"，侧边段落式字符，以及"{{文字A}}""{{文字B}}"等醒目字样）、巨型艺术化字母与细节元素，整体通过高对比色彩、文字与潮流视觉符号，营造出充满个性与未来感的赛博朋克氛围，突出街头文化与科幻风格的融合冲击。'
