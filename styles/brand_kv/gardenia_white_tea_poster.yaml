name: 东方花茶香氛海报
category: brand_kv
ratio: '3:4'
source_author: '@YangOnchain'
source_url: 'https://x.com/YangOnchain'
summary: 柔焦栀子花与东方版式的融合，高级花茶香氛的成品海报。
tags:
- 东方美学
- 花茶香氛
- 柔焦花卉
- 品牌海报
- 版式设计
triggers:
- 花茶海报
- 香氛海报
- 栀子花海报
- 白茶海报
- 东方美学海报
- 柔焦花卉海报
features:
- title: 柔焦花卉摄影
  desc: 花瓣为奶白色和淡象牙白，花心带浅黄色，枝叶为低饱和浅绿色。花朵以大面积柔焦铺陈，中央清晰、四周虚化，形成浅景深和梦境般的白色层次
- title: 奶油白纸张质感
  desc: 背景为温暖奶油白纸张，带细腻颗粒、柔光、淡黄晕染和轻微水彩感，整体清透、安静、东方
- title: 完整排版系统
  desc: 右侧竖排大号中文标题（书法宋体）、红色印章方印、右上小号中文描述、下方英文、左中部信息组、左下角说明文字
- title: 高级品牌调性
  desc: 东方花茶香氛海报，兼具柔焦花卉摄影的柔和感与平面设计的精致排版
- title: 双语言信息层级
  desc: 中文为主视觉标题，英文为辅助信息，信息组按视觉权重排列
variables:
- kv_var: 画面-题材
  style_var: '{花卉题材}'
  desc: 主体花卉，如：栀子花 / 白牡丹 / 山茶花 / 茉莉 / 荷花
- kv_var: 画面-花色
  style_var: '{花色描述}'
  desc: 花瓣主色，如：奶白色和淡象牙白 / 浅粉和乳白 / 纯白透粉
- kv_var: 画面-花心
  style_var: '{花心颜色}'
  desc: 花心辅色，如：浅黄色 / 淡金色 / 浅粉
- kv_var: 画面-枝叶
  style_var: '{枝叶色调}'
  desc: 叶子颜色，如：低饱和浅绿色 / 灰绿色 / 墨绿
- kv_var: 画面-纸张
  style_var: '{纸张色调}'
  desc: 纸张底色，如：奶油白 / 米白 / 淡灰白
- kv_var: 画面-晕染
  style_var: '{晕染色调}'
  desc: 光晕颜色，如：淡黄 / 浅粉 / 米色
- kv_var: 调性
  style_var: '{风格调性}'
  desc: 整体氛围，如：东方 / 法式 / 清冷 / 温润
- kv_var: 文字-标题
  style_var: '{中文标题}'
  desc: 右侧竖排大号标题，如：栀 / 茶 / 白 / 露 / 清 / 静
- kv_var: 文字-印章
  style_var: '{印章文字}'
  desc: 红色印章印文，如：栀 / 茶 / 雅 / 清
- kv_var: 文字-右上
  style_var: '{右上描述}'
  desc: 右上角小号中文，如：花香清致 / 茶气温柔 / 风清月白
- kv_var: 文字-英文
  style_var: '{英文标题}'
  desc: 下方英文，如：Gardenia / White Tea / Jasmine / Pure Breeze
- kv_var: 文字-信息组一
  style_var: '{信息组一}'
  desc: 左中部信息，如：栀子花茶 / 白牡丹茶 / 茉莉花茶
- kv_var: 文字-信息组二
  style_var: '{信息组二}'
  desc: 左中部信息，如：北纬22°-N23° / 海拔800m / 春季采摘
- kv_var: 文字-信息组三
  style_var: '{信息组三}'
  desc: 左中部信息，如：余香隐约 / 花香入水 / 余韵悠长
- kv_var: 文字-说明
  style_var: '{说明文字}'
  desc: 左下角小字说明，如：栀子花遇见白茶，清香与温润相合。风从花间经过，留下淡淡茶气。
- kv_var: 风格
  style_var: '{风格描述}'
  desc: 如：东方花茶 / 法式花艺 / 日系茶道 / 英式花园
- kv_var: 元素
  style_var: '{主体元素}'
  desc: 如：栀子花 / 白牡丹 / 山茶花 / 茉莉花
- kv_var: 辅助色
  style_var: '{辅助色调}'
  desc: 如：淡黄 / 浅粉 / 米色 / 灰绿
prompt: '生成一张竖版 3:4 的成品概念海报。画面主体是几朵柔焦{花卉题材}，花瓣为{花色描述}，花心带{花心颜色}，枝叶为{枝叶色调}。花朵以大面积柔焦方式铺在画面中，中央一朵清晰度最高，右下和背景花朵略微虚化，形成浅景深和梦境般的白色层次。


  背景为温暖{纸张色调}纸张，带细腻颗粒、柔光、{晕染色调}晕染和轻微水彩感，整体清透、安静、{风格调性}。


  版式必须完整：

  - 画面右侧竖排大号中文标题写「{中文标题}」，黑灰色书法宋体

  - 标题旁边加一个小红色印章感方印，印文为{印章文字}

  - 右上角写小中文「{右上描述}」

  - 下方英文写「{英文标题}」

  - 左中部写信息组：「{信息组一} / {信息组二} / {信息组三}」

  - 左下角写一段小中文说明：「{说明文字}」


  视觉风格：{风格描述}海报、{主体元素}、柔焦{主体}摄影、香氛品牌视觉、奶油白留白、{辅助色调}柔光、{辅助色调}枝叶。


  不要水印，不要真实Logo，不要电商广告感，不要卡通风，不要拼贴感，不要复杂背景，不要乱码。'
