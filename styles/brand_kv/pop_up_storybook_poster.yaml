prompt: |
  Create an ultra-premium dreamy papercut storybook poster for "{主体故事}", blending the tenderness of a healing parent-child picture book with the handcrafted wonder of a luxury pop-up book. The image must feel magical, warm, gentle, emotionally comforting, and beautifully dimensional, like a collector's edition children's book designed for intimate reading and lifelong keeping.

