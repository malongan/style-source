  - Optional small supporting English line: "{英文副标语}"

  Color strategy: warm parchment, soft ivory, creamy beige, misty blue, deep warm dark, muted green, dusty gray-blue, and a tiny warm ember glow at the emotional focal point.

  Overall mood: dreamy, healing, warm, dimensional, handcrafted, magical, tender, premium, storybook-like, unforgettable.

