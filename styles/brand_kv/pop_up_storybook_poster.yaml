  At the center of the pop-up scene, create a stylized {主角} in a premium hand-drawn paper-doll aesthetic: large expressive eyes, soft facial features, small adventurous body proportions, layered {色系主色调} clothing, and a brave but tender emotional presence. The character should feel like a beautifully illustrated children's book figure turned into a dimensional papercraft sculpture.

  Opposite the {主角}, create a {伙伴} rising from the book in a soft, magical pop-up form. The {伙伴} should feel lovable, protective, and wondrous: rounded expressive face, {色系辅色调} body tone, painted paper texture, gentle motion arc, and warm emotional presence. The {伙伴} must feel like a fusion of hand-drawn illustration, papercut sculpture, and storybook magic.

  The emotional interaction is the heart of the poster: they face each other in a quiet, tender first-bond moment, with a tiny glowing light, ember, or magical spark between them. This focal point should feel like trust being born. The relationship must feel healing, safe, and full of wonder.

  Build the surrounding world entirely from layered paper engineering: stacked paper mountains, soft cliff contours, village rooftops, cloud cutouts, small waves, flying page layers, paper forests, and delicate sketch lines transitioning into dimensional structures. The world should feel handcrafted and immersive, with visible paper depth and elegant layer separation.

  The visual style must combine: luxury pop-up book design, soft papercut layering, dimensional hand-drawn illustration, and a warm healing picture-book atmosphere. Everything must feel artisanal, magical, and emotionally premium.

  Background must remain minimal and softly luminous: warm ivory, light parchment, pale cream, or soft warm beige, with gentle atmospheric blur and no clutter. No room setting, no shelves, no unnecessary props.

  Lighting must be extremely soft and refined: warm storybook glow, gentle golden-beige illumination, delicate shadows cast by layered paper edges, soft highlight on the character's face, subtle luminous contour, and a calm magical falloff across the book.

