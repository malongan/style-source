name: 泡泡卡片风
category: social_media
ratio: 16:9 / 4:5 / 3:4 / 9:16
source_author: 用户提供
source_url: ''
summary: 抠像人物居中压泡泡大字 + 像素弹窗/进度条/条码等桌面界面元素散落 = 偶像卡片贴纸混合电脑界面的潮流感。
tags:
- 潮流
- 卡片
- 泡泡字
- 人物
- 界面
triggers:
- 泡泡卡片
- 泡泡字
- 偶像卡片风
- 潮流卡片
features:
- title: 极大泡泡字（圆鼓、厚实、手绘变形、高光彩面）
  desc: ''
- title: 抠像/拟真人像置中，身体压住后方字形
  desc: ''
- title: 像素弹窗、进度条、条码、棋盘格角标等桌面元素
  desc: ''
- title: 偶像卡片 × 街头贴纸 × 复古电脑界面混合
  desc: ''
- title: 明亮清透，不做灰浊旧化
  desc: ''
variables:
- kv_var: 主标题
  style_var: '{{主标题}}'
  desc: 最大泡泡字内容
- kv_var: Slogan
  style_var: '{{副信息}}'
  desc: 弹窗/标签中的短信息
- kv_var: 画面元素
  style_var: '{{人物描述}}、{{具体主题内容}}'
  desc: 人物动作+场景描述
- kv_var: 色彩-主色
  style_var: '{{明亮主色}}'
  desc: 泡泡字填充色
- kv_var: 色彩-底场
  style_var: '{{大面积浅亮底场}}'
  desc: 背景色
- kv_var: 色彩-强调
  style_var: '{{强调色}}'
  desc: 点缀色
- kv_var: IP形象
  style_var: 参考图 + "Maintain IP identity..."
  desc: 不在变量里，用参考图
prompt: 围绕{{具体主题内容}}生成一张高明度清透的潮流人物视觉，主体以清晰抠像照片或拟真人像置于画面中轴偏前，人物边缘干净、皮肤与服装保留真实光泽，身体局部自然压住后方字形，形成前景人物与后场图形互相咬合的层次。主标题做成极大尺度泡泡字"{{主标题}}"，圆鼓、厚重、略带手绘变形，粗黑外轮廓与局部内侧阴影提供结构，字腔使用来自主题材质、情绪或身份符号的{{明亮主色}}，表面叠加白色弧形高光、透明渐层和轻微亮面质感，保持明亮轻快、清透干净、通风感强的色光状态。色彩从主题自身提取并映射为{{大面积浅亮底场}}、主题主色泡泡字、黑色信息线框、白色高光、少量高饱和{{强调色}}和中性正文信息，维持大面积明亮、少量醒目点缀、清晰色阶与干净边界，不做灰浊旧化处理。画面加入低密度的像素弹窗、细长进度条、条码、棋盘格角标、短小说明文字、姓名标签和手绘星芒爱心符号；这些元素像散落的桌面界面贴纸一样围绕人物与标题分布，字号层级明确，粗体标题、窄排小字、像素字体与手写线条并置。整体完成度要像偶像卡片、街头贴纸和复古电脑界面的混合设计，边线利落，留白充足，信息装饰有节奏，不把人物淹没在装饰里。
