- kv_var: Slogan
  style_var: '"やっほ〜♡" 贴纸'
  desc: 2-3个次要贴纸装饰
- kv_var: 画面-场景
  style_var: '{{韩式街道/豹纹店面/粉色咖啡厅}}'
  desc: 街头背景
- kv_var: 画面-动作
  style_var: V手势（手掌向前）
  desc: 超广角近景
- kv_var: 色彩-主色
  style_var: 粉色 + 暖色调
  desc: 整体亮丽、热粉色为主
- kv_var: 色彩-底场
  style_var: 自然日光暖调
  desc: 胶片感基调
- kv_var: IP形象
  style_var: 参考图 + "Maintain IP identity and consistency throughout"
  desc: 上传参考图保持一致性
prompt: 'Transform the provided reference image into a cute, trendy, photorealistic K-gyaru street snap.


  Preserve the original person''s identity, facial likeness, natural expression, and realistic atmosphere. The image should look like a candid daytime photo taken by a friend on a Korean street, not a poster,
  cosplay, stage photo, or studio editorial.


  The key pose is an energetic "Yaho!" greeting with a gyaru-style palm-forward V hand pose. The subject extends one hand toward the camera, palm facing forward, with the thumb and index finger spread wide
  into a large V/L-shaped gesture, similar to a playful gyaru claw pose. The other fingers are softly bent and visible. Use a close ultra-wide-angle perspective so the hand appears slightly enlarged in
  the foreground, while the smiling or playful winking face is naturally behind it. Make the long crystal nails, rings, fingers, and palm details clear, sharp, and natural.


  Style the subject with a modern, wearable K-gyaru mood: glossy blonde-brown or warm ash-brown layered hair, soft waves, face-framing bangs, heart or star accessories, glitter eyeshadow, defined eyeliner,
  long lashes, bright under-eye makeup, pink blush, glossy lips, crystal nails, rings, hoop earrings, layered necklaces, heart pendant, chain details, cropped top, mini skirt, belt, and subtle fur or sparkling
  accents blended with trendy Korean street fashion.


  Use a realistic daytime Korean street background: leopard-pattern storefront or poster wall, hot-pink café sign or fashion-shop exterior, or casual K-gyaru street snap atmosphere. Add soft natural light,
  urban reflections, pastel street colors, subtle bokeh, and casual street details.


  Place the exact text "OOO 야호~!" clearly in the upper-left or upper-right empty space. It must be easy to find, accurately readable, and spelled exactly as "Clair 야호~!" Style it as a medium-sized cute
  SNS sticker caption with hot-pink bubble letters, white highlights, a subtle silver glitter outline, and small heart accents. Do not cover the face, extended hand, nails, or important body details. Add
  2-3 small "やっほ〜♡" bubble stickers nearby, secondary to the main text.


  Make the final image feel like a spontaneous compact film camera or disposable camera snapshot, with slight motion blur, soft focus, subtle film grain, realistic daylight highlights, natural skin texture,
  mild noise, sunlit street atmosphere, and a hot-pink, cute, confident, playful, sparkly mood.


  Avoid: night lighting, dark neon atmosphere, unreadable or incorrect text, hidden text, extra fingers, deformed hands, hidden nails, covered face, oversized text, over-retouched skin, HDR look, stiff
  posing, costume-like styling, studio editorial look, or losing the reference likeness.'
