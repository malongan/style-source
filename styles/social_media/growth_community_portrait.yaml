features:
  - "**近景人物回望** — 主形体清晰锚点，略带侧身回望的冷静姿态，轮廓干净，写实质感"
  - "**背景叠印影像** — 织物/纸张颗粒底场上叠低透明放大人物影像，营造记忆与影响力的距离感"
  - "**色块结构梁** — 横向实色块穿过人物背后被遮挡，制造前后关系和行动感"
  - "**多级文字信息** — 上方大号厚重中文标题，中段英文/数字，底部品牌级收束"
  - "**精英化商业色调** — 低明度沉稳底场，深色服装压重，高明度信息色，少量高饱和行动色"

scene: "成长社群招募海报、个人品牌主视觉、商业发布会KV"
ratio: "9:16"
summary: "冷静可靠的精英化商业人像视觉，近景回望人物与背景叠印形成距离感"

prompt: |
  围绕{person_type}生成一张商业成长社群感的人像视觉：画面以近景人物主形体作为最清晰的视觉锚点，人物略带侧身回望的冷静姿态，轮廓边缘干净，五官与服装保持写实质感；背景不是普通场景，而是一面带细微织物、纸张或墙面颗粒的深浅层次底场，叠入一张被放大的低透明人物影像，让它像记忆、声量或公众影响力一样压在后方，只保留脸部与轮廓的隐约存在，形成前景真实人物与背景巨幅影像之间的距离感。文字作为视觉结构的一部分出现：上方使用大号厚重中文标题形成第一信息冲击，字形端正有力量，局部可用主题派生的金属感或温润亮色强调关键词；中下部用小号英文或数字信息形成克制的商业秩序；底部以品牌级标题和短句收束，排版居中、字距稳定、层级清楚。加入几条横向实色块作为结构梁，穿过人物背后并被人物遮挡，制造清晰的前后关系、节奏和社群招募海报的行动感。色彩从主题人物的行业气质、品牌语义和情绪温度中提取：大面积背景承担低明度、低饱和的沉稳结构色，人物服装与阴影使用干净深色压住重量，标题和关键信息使用高明度低噪点的信息色，少量强调块使用主题派生的高饱和行动色，占比小但位置明确；整体保持冷静、可靠、精英化的商业情绪，明暗对比清晰，质感厚实但不脏，纹理只增加专业和年代感，不削弱人物面部的洁净度。最终效果要像一张为个人品牌、成长组织或商业发布打造的强识别主视觉，第一眼读到人物气场和标题压力，第二眼读到背景影像、色块遮挡、纹理和信息层级的精密组织。
  ——————
