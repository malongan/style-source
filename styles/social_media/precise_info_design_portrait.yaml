features:
  - "**大胆裁切偏移** — 主体偏移一侧，半透明暗部遮挡层切过另一侧，形成被看见与被遮蔽的张力"
  - "**强调色线框** — 高饱和直角线框穿过主体外侧，作为结构性强调而非装饰纹样"
  - "**多层文字组织** — 左侧大号粗字标题，中段疏朗英文/数字节奏，边缘竖排第二阅读层"
  - "**黑白灰摄影场** — 大面积低饱和明暗价值阶，暗部干净有层次，轻微颗粒质感"
  - "**清透克制色彩** — 黑白灰主导，点缀主题派生高饱和强调色，避免脏旧浑浊"

scene: "人物专访封面、活动预约页、朋友圈单图发布"
ratio: "9:10"
summary: "被强视觉系统组织的冷静精确肖像，裁切、线框、遮挡与文字共同制造记忆点"

prompt: |
  围绕{subject_type}生成一张冷静、精确、带信息设计感的视觉作品：{subject_description}以肖像般的近距离主形体占据画面核心，右侧或一侧保持最清晰的识别焦点，另一侧被半透明的暗部遮挡层、柔焦阴影或材质雾面切过，形成"被看见与被遮蔽同时存在"的第一眼张力。主体不要完整展示，使用大胆裁切、局部放大和中心偏移，让面部、物体表面或主题关键结构成为沉默的主视觉。叠加一条由主题情绪提取的高饱和强调色线框，线条像路径、界面边界或行动轨迹一样穿过主体外侧，先以直角框住上半部，再在下方转成大弧线收束，线宽清晰，面积很小但视觉权重强，成为结构性强调而不是装饰花纹。画面加入多层文字信息：左侧使用大号粗字建立标题重量，中段使用疏朗的英文或数字节奏制造呼吸，边缘加入细长竖排或窄字距文字作为第二阅读层，底部放低权重说明信息；所有文字只承担版式节奏和信息秩序，不复制任何既有品牌或广告语。色彩从主题自身的材质、情绪和语义中提取，保留大面积低饱和明暗摄影场、清晰黑白灰价值阶、少量主题派生高饱和强调色、明亮干净的信息文字和轻微颗粒质感的关系；整体应是冷静精确、清透克制但有行动感的色彩情绪，暗部要干净有层次，强调色边界利落，避免脏旧、浑浊或随意复古。最终效果像一张被强视觉系统组织过的主题肖像，文字、遮挡、裁切和线框共同制造记忆点，不能退化成普通人物照、普通信息海报或只有文字堆叠的平面排版。
