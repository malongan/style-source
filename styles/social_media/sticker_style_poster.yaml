prompt: 'Create a {ASPECT_RATIO} image in analog-sticker-diary-portrait-poster-style.


  Subject: {SUBJECT}.

  Subject action: {SUBJECT_ACTION}.

  Primary prop: {PRODUCT_OR_PROP}.

  Implied location: {LOCATION}.

  Background elements: {BACKGROUND_ELEMENTS}.

  Main headline text: "{MAIN_TEXT}".

  Secondary micro text: "{SECONDARY_TEXT}".

  Accent symbol: {ACCENT_SYMBOL}.

  Wardrobe styling: {WARDROBE_STYLE}.


  Use a large side-profile or quiet three-quarter illustrated portrait as the anchor. Put the subject on cream graph-paper notebook background with faded blue grid lines. Surround the portrait with sticker-like
  personal objects, tiny paper scraps, tickets, food packaging, stationery, charms, numbers, doodles, tape marks, and small hand-drawn icons.


  Make the main headline huge, rough, hand-drawn, uppercase, orange-red, with blue or dark offset shadow, wrapping across hair, clothing, or open paper space. Keep the portrait calm and introspective while
  the sticker field feels busy and personal.


  The image should feel like a scanned school notebook cover, teen sticker diary, analog music zine, and introspective poster. Add paper grain, halftone speckles, faded ink, smudges, fold marks, slight
  misregistration, and imperfect cutout edges.


  Avoid watermark, username, creator ID, platform logo, QR code, app UI, glossy 3D stickers, clean vector poster, corporate design, sterile spacing, plain background, perfect typography, and photorealistic
  studio portrait.'
