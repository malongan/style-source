prompt: '日系诗意梦幻半写实插画，主体为【xxx】


  光影设定：

  - 光照角度：黄昏逆光，金色夕阳从侧后方照射

  - 光效：形成强烈发丝光与轮廓光


  色彩体系：

  - 高光：暖金黄、奶油白、琥珀橙

  - 阴影/背景：深海蓝、灰蓝、靛青色

  - 对比：蓝橙冷暖对比


  画面质感：

  - 柔焦、朦胧、轻微失焦

  - 局部过曝、边缘泛光扩散

  - 细腻颗粒、轻微噪点

  - 色散、彩虹边

  - 轻微拖影


  整体氛围：浪漫、安静、怀旧、忧郁、梦境感，像90年代日系诗意插画或文艺海报


  可选元素：飞鸟、波光、风、雾气、其他诗意元素

  禁止元素：无文字、无水印、无 logo、无明显摄影感'
