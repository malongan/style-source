prompt: 'Create a {ASPECT_RATIO} image in the "Mountain Trail Monster Doodle Poster" style.


  Subject: {SUBJECT}.

  Subject action: {SUBJECT_ACTION}.

  Product or prop: {PRODUCT_OR_PROP}.

  Location: {LOCATION}.

  Background elements: {BACKGROUND_ELEMENTS}.

  Main text: {MAIN_TEXT}.

  Secondary text: {SECONDARY_TEXT}.

  Accent symbol: {ACCENT_SYMBOL}.

  Wardrobe or visual styling: {WARDROBE_STYLE}.


  Use a realistic candid outdoor hiking photograph as the base layer, with natural daylight, real mountain or trail detail, trees, sky, rocks, and a believable person in practical outdoor clothing. Keep
  the person photographic and naturally integrated into the landscape.


  Overlay one flat hand-drawn red cartoon monster companion beside the person. The monster should have thick black contour lines, brick-red fill, simple dark red shadow shapes, oversized white eyes, tiny
  pupils, sharp white teeth, pale blue sweat drops, and simplified claw hands. Let one arm or claw physically interact with the person, backpack, bottle, map, trail sign, or prop.


  Add oversized irregular comic lettering across the upper sky or mountain area. Use off-white letter fill, black outline, yellow/red/cobalt offset shadows, light inner scribbles, uneven scale, and a playful
  Spanish travel-poster feeling. Add a tiny handwritten note near the headline and a few sparse squiggles, arrows, underlines, or motion marks.


  Avoid watermark, username, creator ID, platform logo, QR code, app UI, realistic demon, horror, blood, violence, 3D mascot, plush toy, full cartoon background, corporate layout, minimalist typography,
  dense text, studio portrait, and low-detail mountains.'
