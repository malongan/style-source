features:
  - "**大尺度主视觉** — 近距离裁切实体形象占据一侧，黑白/低彩度质感，局部越过文字区域"
  - "**巨型装饰引号** — 引号作为第一视觉停顿，厚重无衬线正文建立节奏，短句分行清晰"
  - "**关键词色块强调** — 关键词放入高饱和小面积色块中，紧贴字面形成强烈视觉冲击"
  - "**高明度洁净留白** — 大面积留白+极轻点阵/波纹纹理，流动感但不抢信息"
  - "**强烈阅读路径** — 主视觉压场→引号带入观点→高亮关键词→署名/标识收束"

scene: "金融知识账号朋友圈、小红书观点海报、知识博主名言海报"
ratio: "3:4"
summary: "高对比黑白观点海报，人物侧像+大面积留白+局部色块强调+装饰性引号"

prompt: |
  围绕{theme}生成一张强信息层级的视觉海报：画面由一个大尺度主视觉与一组短句式核心观点构成，主视觉以近距离裁切的{subject}占据一侧，采用黑白或低彩度质感处理，边缘干净利落，局部越过文字区域形成前后层次；背景保持大面积高明度洁净留白，并铺设极轻的主题派生点阵、波纹或微结构纹理，让空白有流动感但不抢主信息。文字区以巨大的装饰性引号作为第一视觉停顿，正文使用厚重无衬线字体建立节奏，短句分行清晰，关键词被放入高饱和小面积色块中，色块紧贴字面形成强烈强调，其余文字用深色结构色保持清楚、理性、可信。色彩从主题自身的材质、情绪或品牌语义中提取：大面积背景维持明亮、清透、通风感，主视觉承担稳定的深浅价值对比，强调色只在关键词块、局部图形或小型信息点中出现，面积少但饱和度高，形成干净、有纪律的视觉冲击；整体避免浑浊和陈旧感，保持高对比、清晰边界、少色而有力。信息布局要有强烈的阅读路径：先看到主视觉压场，再被引号带入观点，最后落到高亮关键词和小型署名/标识信息；所有辅助图形都服务于权威感、秩序感和记忆点，不做装饰堆叠。
  ——————
