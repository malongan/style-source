prompt: 'Create an image in the "Cozy Bedroom Doodle Companion Snapshot" style.


  Aspect ratio: {ASPECT_RATIO}.


  Scene: {SUBJECT} {SUBJECT_ACTION}. Foreground prop or product: {PRODUCT_OR_PROP}. Location: {LOCATION}. Background elements: {BACKGROUND_ELEMENTS}. Main handwritten text: "{MAIN_TEXT}". Secondary handwritten
  text: "{SECONDARY_TEXT}". Accent symbol: {ACCENT_SYMBOL}. Wardrobe style: {WARDROBE_STYLE}. Doodle companion: {DOODLE_COMPANION}. Doodle companion scale: {DOODLE_SCALE}. Light source: {LIGHT_SOURCE}.


  Use a realistic candid phone-photo as the base layer. The scene should feel like a real late-night home interior with imperfect handheld framing, natural room clutter, warm practical light, visible fabric
  texture, wall grain, screen reflections, and mild low-light noise.


  Composite one original flat 2D cushion-doll companion into the lower foreground or beside the main real-world object. The companion should have a rounded pillow body, pale fabric patch face, closed crescent
  eyes, tiny stitched mouth, simple mitten hands, blanket hood or scarf, dark hand-drawn outline, flat muted color fills, and a slightly pasted-on sticker finish. It should feel like a calm illustrated
  friend inside the real photo, not a 3D mascot.


  The doodle companion scale is mandatory: make the companion a large foreground subject, not a tiny corner sticker. In 9:16, it should occupy roughly 35-45% of the frame. In 16:9, it should occupy roughly
  28-38% of the frame. Let the companion enter from the left or lower-left edge and allow partial cropping by the frame edge while keeping the real-world object readable beside or behind it.


  The companion identity is mandatory: make it a new cushion-doll design, not a human child and not the reference toy. Do not give it dark hair, a tan skin-tone face, a navy sweater, pajama pants, smiley
  slippers, or the same seated silhouette as the reference.


  Add only a few tiny hand-drawn diary marks such as a sleep line, star, spark, breath mark, or small smile'
