ratio: "16:9"
summary: "高明度商业图形风格，明亮底色+实拍主体+贴纸式手绘线描叠合，轻快清透"

prompt: |
  围绕任意主题对象生成一张高明度商业图形画面，第一眼先看到超大粗体标题与大片干净留白，第二眼落到被推近视线的真实材质主形体。主形体略带倾斜，靠画面一侧形成强重心，边缘带近距离裁切感，材质要光洁、清晰、可触摸。由主题派生出的手绘线描小角色与符号像贴纸一样叠压在主形体上方和边缘，使用圆润粗线、少量实心块面、轻松表情和简单动作，像在和主体互动，同时保留充足空白，避免复杂插画化。文字是结构的一部分，主题名称用极重无衬线字形成压顶的主视觉，辅助信息用细窄字重分组排列，行距紧凑但呼吸清楚，局部斜线或小标记引导视线。色彩从主题自身的材质、季节、情绪与品牌语义中提取，大面积使用明亮通风的底色，主形体保留清透层次和干净高光，信息文字与线描共用一个高饱和主题强调色，阴影和纹理只做清晰色阶支撑，整体保持明亮轻快、清透洁净、边界锐利。画面要有实拍主形体和平面线描叠合的反差，信息密度集中在标题、辅助字排和主体周围，其他区域安静，让视觉记忆点来自巨大文字、近距离主体和轻快线描的共同压场。
  不要水印，不要真实Logo，不要电商广告感。

