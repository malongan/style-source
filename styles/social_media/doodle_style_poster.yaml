  desc: ''
- kv_var: '`SUBJECT_ACTION`'
  style_var: steering, tapping the horn, checking a mirror, pointing ahead, adjusting the radio, holding a map, or riding through the scene
  desc: ''
- kv_var: '`PRODUCT_OR_PROP`'
