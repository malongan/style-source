  style_var: short hand-drawn word such as AUTO, RIDE, GO, ZOOM, TAXI, JAM, ROLL, or DASH
  desc: ''
prompt: 'Create an image in backseat-transit-doodle-letter-poster-style.


  Aspect ratio: {ASPECT_RATIO}.


  Scene: {SUBJECT} {SUBJECT_ACTION}, with {PRODUCT_OR_PROP}, inside or on {LOCATION}. Background details: {BACKGROUND_ELEMENTS}. Style the subject with {WARDROBE_STYLE}. Use a realistic passenger-seat travel
  photo as the base layer: wide-angle backseat perspective, real vehicle interior, natural daylight through the windows, visible material texture, dashboard and window framing, and a believable road-trip
  or local transit moment.


  Graphic overlay: trace the central subject with a thick electric yellow hand-drawn halo. Add oversized chunky hand-drawn letters spelling "{MAIN_TEXT}" around the subject, tilted and partly cropped by
  the frame. Use golden yellow fills, orange shadow shapes, burnt brown outlines, and sticker-like flat 2D finish.


  Add {ACCENT_SYMBOL}, purple music marks, yellow comic speed rays from the corners, cyan-white cloud or wind swooshes along the lower frame, small sticker bubbles, and playful motion strokes. Keep the
  overlays bold but preserve the subject silhouette, steering gesture, and forward window view.


  Text: use "{MAIN_TEXT}" as the large illustrated word. Add "{SECONDARY_TEXT}" only as tiny clean sticker text if it does not clutter the image. Do not include watermarks, usernames, creator IDs, QR codes,
  platform logos, app marks, copied brand logos, or copied jacket graphics.'
