prompt: "Create a cheerful, creative composition that blends a realistic subject with \nplayful hand-drawn doodles and a subtle micro-story.\n\nSubject:\n[insert object / person / product — keep simple\
  \ and recognizable]\n\nLayout:\n- Invisible clean grid system underneath\n- Balanced, airy spacing (avoid clutter)\n- Clear hierarchy: subject first, doodles second, micro details third\n\nDoodles:\n\
  - Playful, expressive, slightly exaggerated\n- Include: smiley faces, stars, sparkles, arrows, motion lines, cute icons\n- Doodles must INTERACT with the subject (touching, pulling, lifting, reacting)\n\
  \nMicro Story:\n- Add a tiny, fun narrative (e.g., doodle characters using the object, reacting to it)\n- Keep it subtle and discoverable on second glance\n\nTypography:\n- Friendly sans-serif + handwritten\
  \ notes\n- Casual tone (not serious, not corporate)\n- Include small fun labels or thoughts\n\nColor:\nBase: white / soft cream\nInk: soft black / dark grey\nAccents: 2–3 cheerful colors (yellow, sky\
  \ blue, soft red, mint, etc.)\n\nLighting:\n- Bright, soft, uplifting\n- No harsh shadows\n\nStyle:\n- Clean + playful + slightly imperfect\n- Feels human, warm, and creative\n\nConstraints:\n- Do NOT\
  \ overcrowd\n- Every doodle must have purpose or interaction\n- Keep subject clearly visible (no obstruction)\n- Maintain breathing space\n\nMood: [cheerful / curious / lighthearted / imaginative]"
