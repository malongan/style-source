features:
  - "**大面积明亮空白** — 空白成为主要结构场，提供强烈呼吸感和通风感"
  - "**沉稳黑白主形体** — 主题对象压于下方偏一侧，保留真实影像细节与柔和灰阶"
  - "**竖向大字标题立柱** — 极大字号核心中文竖排标题，宋体/明朝体气质，字距疏朗"
  - "**展览目录秩序感** — 顶部细小辅助信息与符号纹理，底部细线/日期数字入口"
  - "**极克制用色** — 只留高明度底色+深色结构+中间灰阶，强调色仅短促出现"

scene: "公众号封面、活动预告首图、文化机构展览海报、书店活动海报"
ratio: "9:10"
summary: "克制清透的文化海报，大面积空白与竖向大字标题形成编辑感，影像文字互相制衡"

prompt: |
  围绕{subject_type}生成一张克制、清透、带强烈编辑感的信息视觉：让大面积明亮空白成为主要结构场，主题对象以沉稳的黑白主形体压在画面下方偏一侧，保留真实影像般的细节、柔和灰阶和清晰轮廓，形成安静而有分量的第一视觉。另一侧放置极大字号的核心中文标题，采用竖向阅读节奏、粗细对照明显的宋体或明朝体气质，字距疏朗，像一根视觉立柱一样与主体形成张力；顶部或边缘加入很小的辅助信息、细密说明和符号纹理，制造展览目录般的秩序感。底部信息层使用细线、日期数字或短句建立阅读入口，文字大小层级明确，留出充足呼吸空间。色彩从主题自身的材质、情绪和文化语义中提取，只保留高明度干净底色、清晰深色结构、柔和中间灰阶和极少量主题派生强调色的关系；强调色只在关键信息处短促出现，带来冷静精确中的一点醒目情绪，整体保持明亮、洁净、通风感，避免脏灰、做旧、烟雾和装饰性堆叠。画面完成度应像严谨文化海报：影像、标题和微小信息互相制衡，最重要的是空白的压力、文字的重量和主题对象的沉静存在感。
  ——————
