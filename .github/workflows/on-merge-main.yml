# .github/workflows/on-merge-main.yml
name: 合并后验证

on:
  pull_request:
    types: [closed]
    branches: [main]
    paths: ['styles/**']

jobs:
  validate:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: 验证所有风格文件
        run: python3 scripts/validate_all.py

      - name: 验证生成文件一致性
        run: |
          python3 scripts/generate_data.py
          python3 scripts/build_gallery.py
          # 忽略 meta.version 和 meta.generated（每次提交后必然变化）
          diff <(git show HEAD:data/styles.json | python3 -m json.tool --no-ensure-ascii) \
               <(python3 -m json.tool --no-ensure-ascii data/styles.json) \
               -I '"version"' -I '"generated"' \
            && echo "✅ 风格数据一致" \
            || {
              echo '❌ 风格数据有差异！请在 PR 分支运行：'
              echo '   python3 scripts/generate_data.py'
              echo '   git add data/styles.json'
              exit 1
            }
          # gallery.html 也跳过版本号行（每次提交后必然变化）
          diff <(git show HEAD:gallery.html | grep -v 'v0\.5\.') \
               <(grep -v 'v0\.5\.' gallery.html) \
            && echo "✅ Gallery 页面一致" \
            || {
              echo '❌ gallery.html 过期！请在 PR 分支运行：'
              echo '   python3 scripts/build_gallery.py'
              echo '   git add gallery.html'
              exit 1
            }
