# .github/workflows/on-merge-main.yml
name: 合并后验证

on:
  pull_request:
    types: [closed]
    branches: [main]
    paths: ['styles/**']

jobs:
  validate:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: 验证所有风格文件
        run: python3 scripts/validate_all.py

      - name: 验证生成文件一致性
        run: |
          python3 scripts/generate_data.py
          python3 scripts/build_gallery.py
          git diff --name-only --exit-code data/styles.json gallery.html || {
            echo '❌ 生成文件过期！请在 PR 分支运行以下命令并重新提交：'
            echo '   python3 scripts/generate_data.py && python3 scripts/build_gallery.py'
            echo '   git add data/styles.json gallery.html'
            echo '   git commit -m "chore: update data/styles.json and gallery.html"'
            exit 1
          }
          echo "✅ 生成文件一致"
