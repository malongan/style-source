rsized foreground gestures, white handwritten diary notes, and saturated comic face overlays.","Use BACKGROUND_ELEMENTS to control secondary scene details, textures, signage, props, and environmental cues.","Use a realistic candid phone-photo as the base layer.","The scene should feel like a real public transit or dense city moment: visible doors, rails, signs, floor markings, lights, scuffed surfaces, reflections, crowd density, practical clothing, and imperfect handheld framing.","Draw playful comic-marker doodles directly on top of the photo."],"tags":["VigoCookbook","handheld","urban","transit","photo-collage","combining","realistic","crowded","metro","bus","tram","station","snapshots","expressive","marker-like","cartoon","doodles","oversized","foreground","gestures","handwritten","diary","notes","saturated","comic","face","overlays"],"source_url":"","source_author":"Vigo AI Visual Prompt Cookbook"},{"id":"vigo_market_brush_produce_poster","code":"ST0032","name":"Market Brush Produce Poster Style","category":"vigo_cookbook","preview_urls":["https://malongan.github.io/style-source/images/styles_previews/vigo_market_brush_produce_poster_1858aa1d.webp"],"preview_webp":"https://malongan.github.io/style-source/images/styles_previews/vigo_market_brush_produce_poster_1858aa1d.webp","summary":"A sparse fresh-market poster system with a warm ivory paper field, one oversized glossy produce hero, a smaller echo product, violent black hand-cut brush typography, thin editorial header text, and tiny bottom seal-like captions.","triggers":["Market Brush Produce Poster Style"],"features":["Warm ivory or pale cream paper background with very large uncluttered negative space.","One oversized photoreal produce hero cropped near an edge, plus one much smaller echo produce item.","Produce surface is glossy, rounded, bright, softly airbrushed, and slightly posterized rather than documentary.","Hard scale contrast between produce and typography: subject dominates the lower or side field while type crowds the upper or opposite side.","Large black headline built from torn, stamped, rough-brush CJK-inspired blocks with uneven edges and dry ink texture."],"tags":["VigoCookbook","Other"],"source_url":"","source_author":"Vigo AI Visual Prompt Cookbook"},{"id":"vigo_luxury_street_cover","code":"ST0033","name":"Kinetic Luxury Street Fashion Cover Style","category":"vigo_cookbook","preview_urls":["https://malongan.github.io/style-source/images/styles_previews/vigo_luxury_street_cover_bd9a5f9e.webp"],"preview_webp":"https://malongan.github.io/style-source/images/styles_previews/vigo_luxury_street_cover_bd9a5f9e.webp","summary":"A premium street-fashion magazine cover style built from side-profile walking photography, horizontal motion-blurred architecture, one dominant luxury garment, wind-shaped hair, restrained urban neutrals, and oversized wide-spaced serif cover typography. It preserves the kinetic editorial grammar of the reference while changing the model identity, wardrobe, prop, headline, and story details.","triggers":["Kinetic Luxury Street Fashion Cover Style"],"features":["High-end realistic fashion editorial photography, not illustration, collage, or catalog rendering.","Single model or one dominant model cropped large from thigh to head, moving laterally through the frame.","Side-profile or three-quarter walking pose with calm luxury expression and deliberate street-stride energy.","Strong horizontal motion blur in the background, as if the camera is panning with the subject.","Sharp subject against blurred stone, window, pavement, and street bands, with readable fabric texture."],"tags":["VigoCookbook","Other"],"source_url":"","source_author":"Vigo AI Visual Prompt Cookbook"},{"id":"vigo_kinetic_geometric_doodle_cutouts","code":"ST0034","name":"Kinetic Geometric Doodle Cutouts","category":"vigo_cookbook","preview_urls":["https://malongan.github.io/style-source/images/styles_previews/vigo_kinetic_geometric_doodle_cutouts_87c9a8f6.webp"],"pre nd with BACKGROUND_ELEMENTS worked into the collage texture.","Place the subject as a large central portrait cutout with a thick irregular torn white paper border.","Add oversized warped display typography reading MAIN_TEXT as a tilted collage layer, plus smaller sticker blocks and side editorial captions reading SECONDARY_TEXT.","Use acid lime, electric blue, alert red, paper white, and ink black."],"tags":["VigoCookbook","maximalist","K-pop","fashion","zine","collage","central","portrait","crumpled","monochrome","paper","skewed","ransom-note","typography","loud","sticker","blocks","saturated","lime/blue/red","accents","bold","bottom","masthead","band"],"source_url":"","source_author":"Vigo AI Visual Prompt Cookbook"},{"id":"vigo_impact_burst_halftone_comic_poster","code":"ST0036","name":"Impact Burst Halftone Comic Poster Style","category":"vigo_cookbook","preview_urls":["https://malongan.github.io/style-source/images/styles_previews/vigo_impact_burst_halftone_comic_poster_e070ca7c.webp"],"preview_webp":"https://malongan.github.io/style-source/images/styles_previews/vigo_impact_burst_halftone_comic_poster_e070ca7c.webp","summary":"A loud retro comic poster system built from thick black ink, flat high-saturation colors, oversized impact typography, exaggerated illustrated subjects, diagonal props, speech bursts, smoke puffs, halftone dots, and distressed screen-print grain.","triggers":["Impact Burst Halftone Comic Poster Style"],"features":["Preserve the core visual identity: A loud retro comic poster system built from thick black ink, flat high-saturation colors, oversized impact typography, exaggerated illustrated subjects, diagonal props, speech bursts, smoke puffs, halftone dots, and distressed screen-print grain.","Layout: use a bold cropped comic-poster composition.","Place the main subject large in the lower two-thirds and let the oversized prop cut diagonally across the body or foreground.","Style: thick uneven black contour lines, flat hot-orange and aged <script>
/* ========== 渲染功能 ========== */

/** 构建单张 style-card 的 HTML（WebP 优先） */
function buildCardHTML(s, idx, total) {
  idx = idx || 0;
  total = total || 0;
  var isNew = total > 10 && idx >= total - 10;
  var imgUrl = s.preview_webp || (s.preview_urls || [])[0] || '';
  var tags = (s.tags || []).join(',');
  var summary = s.summary || '';
  var triggers = Array.isArray(s.triggers) ? s.triggers.join(', ') : (s.triggers || '');
  var features = (s.features || []).join('|');
  var sourceUrl = s.sourceUrl || s.source_url || '';
  var sourceAuthor = s.sourceAuthor || s.source_author || '';

  var linkHtml = '';
  if (sourceUrl) {
    linkHtml = '<a href="' + sourceUrl.replace(/"/g,'&quot;') + '" target="_blank" class="card-link">' +
      (sourceAuthor ? '🔗 @' + sourceAuthor.replace(/"/g,'&quot;') : '🔗 来源') + '</a>';
  }

  // 🆕 新风格标记（最后10个）
  var badgeHtml = isNew ? '<span class="card-badge-new">🆕 NEW</span>' : '';

  // 直接用 WebP（不再使用 <picture> 包装，节省体积）
  var imgHtml = '<img src="' + imgUrl + '" alt="' + s.name + '" class="card-image" loading="lazy"'
    + ' onerror="this.outerHTML=window.__FALLBACK_IMG__">';

  return '<div class="style-card" data-id="' + s.id + '"' +
    ' data-code="' + (s.code || '') + '"' +
    ' data-summary="' + summary.replace(/"/g,'&quot;') + '"' +
    ' data-features="' + features.replace(/"/g,'&quot;') + '"' +
    ' data-triggers="' + triggers.replace(/"/g,'&quot;') + '"' +
    ' data-tags="' + tags + '"' +
    ' data-number="' + (s.code || s.number || s.id || '') + '"' +
    ' data-category="' + s.category + '"' +
    ' data-original-index="' + idx + '">' +
    '<div class="card-image-wrap">' +
    imgHtml +
    badgeHtml +
    '</div>' +
    '<div class="card-content">' +
      '<div class="card-title-row">' +
        '<span class="card-number">' + (s.code ? '#' + s.code : '#' + (s.number || s.id || '')) + '</span>' +
        '<span class="card-category">' + (s.category || '') + '</span>' +
      '</div>' +
      '<h3 class="card-title">' + s.name + '</h3>' +
      '<div class="card-footer">' +
        linkHtml +
        '<button class="favorite-btn" data-id="' + s.id + '" title="收藏">收藏</button>' +
      '</div>' +
    '</div>' +
  '</div>';
}

/** 从 JSON 数据渲染瀑布流卡片 */
function renderGallery(data) {
  var styles = data.styles || [];
  var loading = document.getElementById('loading');
  var app = document.getElementById('app');

  if (loading) loading.style.display = 'none';
  if (app) app.style.display = 'block';

  var grid = document.querySelector('.gallery-grid');
  if (!grid) return;

  var totalStyles = styles.length;
  grid.innerHTML = styles.map(function(s, i) { return buildCardHTML(s, i, totalStyles); }).join('');

  // 更新结果计数（可见数 = 总数，初始无筛选）
  var countEl = document.getElementById('countVisible');
  var totalEl = document.getElementById('countTotal');
  if (countEl) countEl.textContent = styles.length;
  if (totalEl) totalEl.textContent = styles.length;

  // 修正 gallery.js extractCategories() 的 all 计数 bug
  window.__totalStyles = styles.length;

  // 渲染完成后调用 gallery.js 的 init() 绑定事件
  if (typeof window.init === 'function') window.init();

  // 修复 all 计数（gallery.js 的 extractCategories 不递增 all）
  if (window.galleryCategories) {
    window.galleryCategories.all = window.__totalStyles || styles.length;
    // 重新渲染分类按钮以显示正确计数
    var catBtns = document.querySelectorAll('.category-btn');
    catBtns.forEach(function(b) {
      if (b.dataset.category === 'all') {
        var countSpan = b.querySelector('.tag-count');
        if (countSpan) countSpan.textContent = window.galleryCategories.all;
      }
    });

    // 绑定编号点击复制
    document.querySelectorAll('.card-number').forEach(function(el) {
      el.addEventListener('click', function(e) {
        e.stopPropagation();
        var code = this.textContent.replace('#', '').trim();
        if (!code) return;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(code).then(function() {
            el.classList.add('copied');
            setTimeout(function() { el.classList.remove('copied'); }, 1500);
          }).catch(function() { fallbackCopy(code, el); });
        } else {
          fallbackCopy(code, el);
        }
      });
    });
  }

  function fallbackCopy(text, el) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    el.classList.add('copied');
    setTimeout(function() { el.classList.remove('copied'); }, 1500);
  }
}

/** 从 JSON 或回退数据渲染 */
async function loadGallery() {
  try {
    const resp = await fetch('https://malongan.github.io/style-source/data/styles.json?t=' + Date.now());
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    renderGallery(data);
  } catch(e) {
    console.warn('JSON 加载失败，使用备用数据', e);
    if (window.__FALLBACK_DATA__) renderGallery(window.__FALLBACK_DATA__);
  }
}

loadGallery();
</script>
